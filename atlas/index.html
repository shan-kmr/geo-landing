<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Janus — Atlas · New York</title>
<link href="./vendor/maplibre-gl.css" rel="stylesheet"/>
<style>
@font-face{font-family:"Space Grotesk";font-weight:500;font-display:swap;
src:url("./vendor/fonts/space-grotesk-500.woff2") format("woff2")}
@font-face{font-family:"Space Grotesk";font-weight:600;font-display:swap;
src:url("./vendor/fonts/space-grotesk-600.woff2") format("woff2")}
:root{--ground:#FCFCFB;--ink:#16181A;--fg2:#4A4E54;--muted:#7A7F85;--faint:#B9BCC1;
--line:#E9EAEC;--line2:#F2F3F4;--signal:#D9480F;
--mono:ui-monospace,"SF Mono",Menlo,monospace;
--sans:-apple-system,"Helvetica Neue",Helvetica,Arial,sans-serif;
--disp:"Space Grotesk",-apple-system,"Helvetica Neue",sans-serif;}
*{box-sizing:border-box}
html,body{margin:0;height:100%;background:var(--ground);font-family:var(--sans);color:var(--ink);overflow:hidden}
#map{position:absolute;inset:0}
/* top bar */
#bar{position:absolute;top:0;left:0;right:0;z-index:20;display:flex;align-items:center;gap:16px;
padding:14px 18px;pointer-events:none}
#bar>*{pointer-events:auto}
.brand{font-family:var(--mono);font-size:12px;letter-spacing:.28em;font-weight:700;color:var(--ink);text-decoration:none;
background:rgba(252,252,251,.85);backdrop-filter:blur(8px);padding:8px 12px;border:1px solid var(--line);border-radius:4px}
.brand small{letter-spacing:.14em;color:var(--muted);font-weight:400;margin-left:8px}
.chip{font-family:var(--mono);font-size:11.5px;letter-spacing:.06em;color:var(--ink);
background:rgba(252,252,251,.85);backdrop-filter:blur(8px);border:1px solid var(--line);border-radius:4px;
padding:8px 12px;cursor:pointer;display:flex;align-items:center;gap:7px}
.chip i{width:5px;height:5px;border-radius:50%;background:var(--ink);display:inline-block}
.chip:not(.on){color:var(--muted)}
.chip:not(.on) i{opacity:.25}
/* search */
#sbox{display:none;position:absolute;top:56px;right:18px;z-index:26;width:min(380px,86vw)}
#sbox input{width:100%;font-family:var(--mono);font-size:12.5px;color:var(--ink);
background:rgba(252,252,251,.96);backdrop-filter:blur(8px);border:1px solid var(--line);
border-radius:6px;padding:10px 12px;outline:none}
#sbox input:focus{border-color:var(--ink)}
#sres{margin-top:6px;background:rgba(252,252,251,.97);backdrop-filter:blur(8px);
border:1px solid var(--line);border-radius:6px;overflow:hidden;box-shadow:0 8px 30px rgba(22,24,26,.08)}
#sres:empty{display:none}
.srow{display:flex;justify-content:space-between;align-items:baseline;gap:12px;
padding:9px 12px;border-top:1px solid var(--line2);cursor:pointer}
.srow:first-child{border-top:none}
.srow:hover,.srow.sel{background:#fff}
.srow .nm{font-size:.86rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.srow .rc{font-family:var(--mono);font-size:.58rem;color:var(--muted);flex:none}
.srow.muted{color:var(--muted);font-family:var(--mono);font-size:.66rem;cursor:default}
.pmark{display:flex;align-items:center;gap:7px;pointer-events:none}
.pmark i{width:9px;height:9px;border-radius:50%;background:var(--ink);display:block;flex:none;
box-shadow:0 0 0 3px rgba(252,252,251,.85)}
.pmark span{font-family:var(--disp);font-size:13px;font-weight:600;color:var(--ink);
text-shadow:0 0 4px var(--ground),0 0 4px var(--ground),0 0 6px var(--ground);white-space:nowrap}
/* card panel */
#panel{position:absolute;top:0;right:0;bottom:0;width:min(430px,92vw);z-index:30;background:var(--ground);
border-left:1px solid var(--line);transform:translateX(103%);transition:transform .32s cubic-bezier(.2,.8,.25,1);
display:flex;flex-direction:column}
#panel.open{transform:none;box-shadow:-18px 0 44px rgba(22,24,26,.07)}
#panel-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--line2)}
#panel-head .t{font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
#panel-close{margin-left:auto;border:1px solid var(--line);background:#fff;border-radius:4px;
font-family:var(--mono);font-size:11px;padding:5px 10px;cursor:pointer;color:var(--fg2)}
#panel-body{overflow-y:auto;padding:14px 16px 40px}
/* card content (jx system, white doctrine) */
.jx-card{border:1px solid var(--line);border-radius:8px;background:#fff;padding:18px 20px}
.jx-cid{font-family:var(--mono);font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.jx-big{font-size:2.3rem;font-weight:700;line-height:1;margin:4px 0 2px;letter-spacing:-.02em}
.jx-big small{font-size:.85rem;color:var(--muted);font-family:var(--mono);letter-spacing:.04em;font-weight:400}
.jx-row{display:flex;justify-content:space-between;gap:12px;font-size:.88rem;padding:5px 0;border-top:1px solid var(--line2)}
.jx-row .k{color:var(--fg2)}.jx-row .v{font-family:var(--mono);font-size:.78rem;text-align:right}
.jx-row .v b{color:var(--ink);font-weight:650}
.jx-lab{font-family:var(--mono);font-size:.58rem;letter-spacing:.12em;text-transform:uppercase;color:var(--muted);margin:14px 0 6px}
.jx-hist{display:flex;align-items:flex-end;gap:2px;height:46px}
.jx-hist .b{flex:1;background:var(--ink);border-radius:1px 1px 0 0;min-height:1px;opacity:.78}
.jx-hticks{display:flex;justify-content:space-between;font-family:var(--mono);font-size:.55rem;color:var(--faint);margin-top:3px}
.jx-fac{font-size:.84rem;padding:3px 0;display:flex;justify-content:space-between}
.jx-fac .c{font-family:var(--mono);font-size:.72rem;color:var(--muted)}
.jx-txt{font-size:.85rem;color:var(--fg2);line-height:1.5;margin-top:4px}
.jx-sec{margin-top:15px}
/* v3 dossier card — Desk 06 */
.jx-place{font-family:var(--disp);font-size:1.3rem;font-weight:600;letter-spacing:-.014em;margin:3px 0 2px}
.jx-lede{font-family:var(--disp);font-size:1.06rem;font-weight:600;letter-spacing:-.012em;
line-height:1.32;margin:12px 0 4px}
.jx-lede a{color:var(--ink);border-bottom:1px solid #DADBDD;cursor:pointer}
.jx-lede a:hover{border-bottom-color:var(--ink)}
.jx-figs{display:flex;gap:14px;border-top:1px solid var(--line);border-bottom:1px solid var(--line);
margin-top:13px;padding:11px 0}
.jx-fig{flex:1;min-width:0}
.jx-fig+.jx-fig{border-left:1px solid var(--line2);padding-left:14px}
.jx-fig b{font-size:1.45rem;font-weight:700;letter-spacing:-.02em;display:block}
.jx-fig small{font-family:var(--mono);font-size:.56rem;color:var(--muted);line-height:1.55;
display:block;margin-top:3px;letter-spacing:.02em}
.jx-anchor{border:1px solid var(--ink);border-radius:8px;background:#fff;padding:11px 14px;margin:6px 0 4px}
.jx-anchor .tier{font-family:var(--mono);font-size:.56rem;letter-spacing:.1em;border:1px solid var(--line);
border-radius:3px;padding:1.5px 6px;color:var(--fg2)}
.jx-anchor .nm{font-family:var(--disp);font-size:1.12rem;font-weight:600;letter-spacing:-.012em;display:block;margin-top:6px}
.jx-anchor .rc{font-family:var(--mono);font-size:.62rem;color:var(--muted);display:block;margin-top:3px}
.jx-nrow{display:flex;justify-content:space-between;align-items:baseline;gap:10px;padding:8px 2px;
border-bottom:1px solid var(--line2)}
.jx-nrow .nm{font-size:.9rem;font-weight:600}
.jx-nrow .rc{font-family:var(--mono);font-size:.58rem;color:var(--muted);text-align:right;flex:none}
.jx-nrow.dim .nm{color:var(--fg2);font-weight:500}
.jx-fabric{font-family:var(--mono);font-size:.64rem;color:var(--faint);padding:8px 2px 4px}
/* life instrument band (Desk 06 / 3b boxed) */
.jx-instband{display:flex;flex-direction:column;gap:9px;margin-top:13px}
.jx-instbox{border:1px solid var(--line);border-radius:8px;background:#fff;padding:11px 14px 12px}
.jx-instbox .h{display:flex;justify-content:space-between;font-family:var(--mono);font-size:.56rem;
letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.jx-instbox .v{display:flex;align-items:baseline;gap:7px;margin-top:3px}
.jx-instbox .v b{font-size:1.3rem;font-weight:700;letter-spacing:-.02em}
.jx-instbox .v small{font-family:var(--mono);font-size:.6rem;color:var(--muted)}
.jx-lifeline{font-family:var(--mono);font-size:.66rem;color:var(--fg2);padding:1px 2px 0}
.jx-lifeline b{color:var(--ink)}
/* distribution strip */
.jx-ins{margin:9px 0 4px}
.jx-ins .h{display:flex;justify-content:space-between;font-family:var(--mono);font-size:.56rem;
letter-spacing:.07em;color:var(--muted);text-transform:uppercase}
.jx-ins .rail{position:relative;height:14px;margin-top:5px}
.jx-ins .rail i,.jx-ins .rail b{position:absolute;display:block}
.jx-ins .rail .tr{left:0;right:0;top:6px;height:2px;background:#EDEEEF}
.jx-ins .rail .bd{top:6px;height:2px;background:#D5D7D9}
.jx-ins .rail .md{top:2px;width:1px;height:10px;background:var(--faint)}
.jx-ins .rail .tk{top:0;width:2.5px;height:14px;background:var(--ink)}
.jx-ins .lab{display:flex;justify-content:space-between;font-family:var(--mono);font-size:.55rem;
color:var(--faint);margin-top:4px}
details.jx-acc{border-top:1px solid var(--line2)}
details.jx-acc summary{display:flex;justify-content:space-between;align-items:baseline;gap:10px;
cursor:pointer;list-style:none;padding:11px 0}
details.jx-acc summary::-webkit-details-marker{display:none}
details.jx-acc summary .l{font-family:var(--mono);font-size:.6rem;letter-spacing:.13em;
text-transform:uppercase;color:var(--muted)}
details.jx-acc summary .l::before{content:"▸ ";color:var(--faint)}
details.jx-acc[open] summary .l::before{content:"▾ "}
details.jx-acc[open] summary .l{color:var(--ink)}
details.jx-acc summary .hd{font-family:var(--mono);font-size:.72rem;color:var(--fg2);text-align:right}
details.jx-acc summary .hd b{color:var(--ink);font-weight:650}
details.jx-acc .jx-bd{padding:0 0 14px}
details.jx-acc .jx-bd .jx-lab:first-child{margin-top:2px}
@keyframes jxIn{from{opacity:0;transform:translateY(9px)}to{opacity:1;transform:none}}
.jx-card{animation:jxIn .3s ease-out both}
@media (prefers-reduced-motion:reduce){.jx-card,#panel{animation:none!important;transition:none!important}}
</style>
<script src="./vendor/maplibre-gl.js"></script>
<script src="./vendor/pmtiles.js"></script>
<script src="./vendor/h3-js.umd.js"></script>
<script src="./vendor/deck.min.js"></script>
<script src="./vendor/deck-mapbox.min.js"></script>
</head>
<body>
<div id="map"></div>
<div id="bar">
  <a class="brand" href="../">JANUS<small>ATLAS · NEW YORK</small></a>
  <button id="fq" class="chip on"><i></i>fatal crashes 22–24</button>
  <button id="sbtn" class="chip" style="margin-left:auto">⌕ search</button>
</div>
<div id="sbox">
  <input id="sin" placeholder="find a place — bar, café, landmark…" autocomplete="off" spellcheck="false"/>
  <div id="sres"></div>
</div>
<div id="stamp" style="position:absolute;left:10px;bottom:8px;z-index:9;font:10px/1 ui-monospace,Menlo,monospace;letter-spacing:.08em;color:#B9BCC1;pointer-events:none">atlas v20 · soft-spotlight<span id="tr"></span></div>
<aside id="panel">
  <div id="panel-head"><span class="t" id="panel-title">CELL</span>
    <button id="panel-close">esc</button></div>
  <div id="panel-body"></div>
</aside>
<script>
const STATIC="./data";
const LIVE_DISCOVERY="https://huggingface.co/datasets/skay97/curbai-tiles/resolve/main/live_endpoint.json";
const TILES=new URL("./data/nyc_buildings.pmtiles",location.href).href;
const BASEMAP="./basemap-style.json";
const LADDER=[[5,0],[6,5.8],[7,7.3],[8,8.8],[9,10.3]], BUILDING_ZOOM=13.4;

let map,overlay,store={},centers=[],requested=new Set(),live=null,focus=null,hoverId=null,
    fars=null,crashesOn=true,spotlight=false;
let view={latitude:40.748,longitude:-73.985,zoom:11.9,pitch:48,bearing:-12};
const panel=document.getElementById("panel"),pbody=document.getElementById("panel-body"),
      ptitle=document.getElementById("panel-title"),
      trEl=document.getElementById("tr");
function trace(s){if(trEl)trEl.textContent=" · "+s;}
window.onerror=(m)=>{console.error("[atlas]",m);trace("ERR "+String(m).slice(0,80));};
document.addEventListener("pointerdown",e=>{const t=e.target;trace("tap:"+(t.id||t.tagName));},true);

function activeRes(z){let r=5;for(const[res,mz]of LADDER)if(z>=mz)r=res;return r;}

let R5=null;
async function loadR5(){
 if(!R5) R5=await fetch(STATIC+"/r5.json").then(r=>r.json());
 store["5"]=new Map();centers=[];
 for(let i=0;i<R5.h3.length;i++){store["5"].set(R5.h3[i],1);
  centers.push([R5.h3[i],R5.lat[i],R5.lon[i]]);}
 redraw();maybeNeed();
}
function visibleParents(){
 if(!map||!centers.length)return[];
 const b=map.getBounds(),w=b.getWest(),e=b.getEast(),s=b.getSouth(),n=b.getNorth();
 const pLon=(e-w)*.25,pLat=(n-s)*.25,out=[];
 for(const[id,la,lo]of centers)if(lo>w-pLon&&lo<e+pLon&&la>s-pLat&&la<n+pLat)out.push(id);
 const CAP={6:140,7:120,8:48,9:10};return out.slice(0,CAP[activeRes(view.zoom)]||60);
}
let needTimer=null;
function maybeNeed(){
 const res=activeRes(view.zoom);if(res===5)return;
 const missing=visibleParents().filter(p=>!requested.has(res+":"+p));
 if(!missing.length)return;
 clearTimeout(needTimer);
 needTimer=setTimeout(async()=>{
  await Promise.all(missing.map(async p=>{
   requested.add(res+":"+p);
   const c=await fetch(STATIC+"/chunks/"+res+"/"+p+".json").then(r=>r.json()).catch(()=>null);
   if(!c)return;
   if(!store[res])store[res]=new Map();
   for(const id of c.h3)store[res].set(id,1);
  }));
  redraw();
 },240);
}
function buildLayers(){
 const res=activeRes(view.zoom),layers=[];
 // invisible pick skin: highest loaded res at or under the ladder step
 let skin=null;
 for(let r=res;r>=5;r--){const s=store[String(r)];if(s&&s.size){skin=r;break;}}
 if(skin!=null)layers.push(new deck.H3HexagonLayer({id:"hex-r"+skin,
  data:[...store[String(skin)].keys()].map(id=>({id})),
  getHexagon:d=>d.id,filled:true,stroked:false,extruded:false,coverage:1,
  getFillColor:[0,0,0,1],pickable:true,autoHighlight:false}));
 if(crashesOn&&fars)layers.push(new deck.ScatterplotLayer({id:"fars",data:fars.pts,
  getPosition:d=>[d[0],d[1]],getRadius:d=>9+d[2]*7,radiusMinPixels:1.7,radiusMaxPixels:4.5,
  getFillColor:[22,24,26,175],pickable:false}));
 if(live){
  if(live.buses.length)layers.push(new deck.ScatterplotLayer({id:"live-bus",
   data:[...live.buses].sort((a,b)=>String(a[3])>String(b[3])?1:-1),
   getPosition:d=>[d[0],d[1]],getRadius:16,radiusMinPixels:2.2,radiusMaxPixels:5,
   getFillColor:[217,72,15,205],pickable:false,
   transitions:{getPosition:{duration:18000,easing:t=>t}},updateTriggers:{getPosition:[live.ts]}}));
  if(live.bikes.length)layers.push(new deck.ScatterplotLayer({id:"live-bike",
   data:live.bikes,getPosition:d=>[d[0],d[1]],getRadius:d=>6+d[2]*15,
   radiusMinPixels:1.2,radiusMaxPixels:4,getFillColor:d=>[217,72,15,60+d[2]*90],pickable:false,
   transitions:{getRadius:800},updateTriggers:{getRadius:[live.ts]}}));
 }
 if(hoverId&&hoverId!==focus)
  layers.push(new deck.H3HexagonLayer({id:"hover",data:[{id:hoverId}],
   getHexagon:d=>d.id,filled:false,stroked:true,extruded:false,
   getLineColor:[22,24,26,95],lineWidthMinPixels:1,pickable:false}));
 if(focus)
  layers.push(new deck.H3HexagonLayer({id:"focus",data:[{id:focus}],
   getHexagon:d=>d.id,filled:true,stroked:true,extruded:false,
   getFillColor:spotlight?[252,252,251,26]:[217,72,15,14],
   getLineColor:spotlight?[22,24,26,200]:[217,72,15,215],
   lineWidthMinPixels:2,pickable:false,updateTriggers:{getFillColor:[spotlight],getLineColor:[spotlight]}}));
 return layers;
}
function redraw(){if(overlay)overlay.setProps({layers:buildLayers()});}

async function openCard(id){
 focus=id;redraw();
 ptitle.textContent="R9 · "+id.slice(-12);
 pbody.innerHTML='<div style="font-family:var(--mono);font-size:11px;color:var(--muted);padding:20px 4px">reading the cell…</div>';
 panel.classList.add("open");
 history.replaceState(null,"","?h="+id);
 const c=await fetch(STATIC+"/cards/"+id+".html").then(r=>r.ok?r.text():null).catch(()=>null);
 if(c){pbody.innerHTML=c;
  const pl=pbody.querySelector(".jx-place");
  if(pl)ptitle.textContent=pl.textContent;}
 else pbody.innerHTML='<div style="font-family:var(--mono);font-size:11px;color:var(--muted);padding:20px 4px">no card for this cell — outside the NYC grid</div>';
}
function closeCard(){panel.classList.remove("open");focus=null;
 if(marker){marker.remove();marker=null;}
 const hs=map&&map.getSource&&map.getSource("hib");
 if(hs)hs.setData({type:"FeatureCollection",features:[]});
 if(spotlight){spotlight=false;
  try{map.setPaintProperty("bldg3d","fill-extrusion-opacity",.8);}catch(e){}}
 redraw();
 history.replaceState(null,"",location.pathname);}
document.getElementById("panel-close").onclick=closeCard;
addEventListener("keydown",e=>{if(e.key==="Escape")closeCard();});
pbody.addEventListener("click",e=>{
 const j=e.target.closest("[data-jump]");if(!j)return;
 const d=pbody.querySelector('details[data-sec="'+j.dataset.jump+'"]');
 if(d){d.open=true;d.scrollIntoView({behavior:"smooth",block:"start"});}
});

function onClick(info){
 if(!info||!info.object||!info.object.id)return;
 const id=info.object.id,m=((info.layer&&info.layer.id)||"").match(/^hex-r(\d)/);
 const res=m?parseInt(m[1]):activeRes(view.zoom);
 if(res>=9){openCard(id);return;}
 const next=LADDER.find(([r])=>r===Math.min(res+1,9));
 const c=h3.cellToLatLng(id);if(!c)return;
 map.flyTo({center:[c[1],c[0]],zoom:(next?next[1]:11)+.55,duration:950,essential:true});
}

document.getElementById("fq").onclick=e=>{
 crashesOn=!crashesOn;
 e.currentTarget.classList.toggle("on",crashesOn);
 redraw();
 trace("crashes:"+(crashesOn?"on":"off"));
};

// ---- place search ----
const sbox=document.getElementById("sbox"),sin=document.getElementById("sin"),
      sres=document.getElementById("sres");
let SIDX=null,marker=null,shownHits=[];
document.getElementById("sbtn").onclick=async()=>{
 sbox.style.display="block";sin.focus();trace("search:open");
 if(!SIDX){
  sres.innerHTML='<div class="srow muted">reading the index…</div>';
  SIDX=await fetch(STATIC+"/search.json").then(r=>r.json()).catch(()=>[]);
  sres.innerHTML='<div class="srow muted">'+SIDX.length.toLocaleString()+' places · type to find one</div>';
 }
};
function closeSearch(){sbox.style.display="none";sin.value="";sres.innerHTML="";shownHits=[];}
addEventListener("keydown",e=>{if(e.key==="Escape")closeSearch();});
sin.oninput=()=>{
 const q=sin.value.trim().toLowerCase();
 if(q.length<2||!SIDX){sres.innerHTML="";shownHits=[];return;}
 const hits=[];
 for(const e of SIDX){
  const n=e[0].toLowerCase();
  const s=n.startsWith(q)?3:n.split(/[\s'’]+/).some(w=>w.startsWith(q))?2:n.includes(q)?1:0;
  if(s)hits.push([s,e]);
 }
 hits.sort((a,b)=>b[0]-a[0]||b[1][4]-a[1][4]);
 shownHits=hits.slice(0,8).map(h=>h[1]);
 sres.innerHTML=shownHits.map((e,i)=>
  '<div class="srow" data-i="'+i+'"><span class="nm">'+e[0]+'</span><span class="rc">'
  +e[3]+(e[4]>=1000?" · "+(e[4]-1000)+" wiki ed.":"")+'</span></div>').join("")
  ||'<div class="srow muted">nothing by that name</div>';
};
sin.onkeydown=e=>{if(e.key==="Enter"&&shownHits.length)goPlace(shownHits[0]);};
sres.onclick=e=>{const r=e.target.closest(".srow");if(r&&r.dataset.i!=null&&shownHits[+r.dataset.i])goPlace(shownHits[+r.dataset.i]);};
function goPlace(e){
 const[nm,la,lo]=e;
 closeSearch();
 const cell=h3.latLngToCell(la,lo,9);
 if(marker){marker.remove();marker=null;}
 const hs=map.getSource("hib");if(hs)hs.setData({type:"FeatureCollection",features:[]});
 trace("go:"+nm.slice(0,22));
 map.flyTo({center:[lo,la],zoom:14,pitch:55,bearing:-18,duration:2600,curve:1.55,essential:true});
 map.once("moveend",()=>{
  spotlight=true;
  try{map.setPaintProperty("bldg3d","fill-extrusion-opacity",.1);}catch(e){}
  openCard(cell);
  const el=document.createElement("div");el.className="pmark";
  const dot=document.createElement("i"),lab=document.createElement("span");
  lab.textContent=nm;el.appendChild(dot);el.appendChild(lab);
  marker=new maplibregl.Marker({element:el,anchor:"left",offset:[-4,0]}).setLngLat([lo,la]).addTo(map);
  setTimeout(()=>{
   try{
    const pt=map.project([lo,la]);
    const fs=map.queryRenderedFeatures([[pt.x-8,pt.y-8],[pt.x+8,pt.y+8]],{layers:["bldg3d"]});
    if(fs.length&&map.getSource("hib"))
     map.getSource("hib").setData({type:"FeatureCollection",features:[
      {type:"Feature",geometry:fs[0].geometry,properties:{h:fs[0].properties.h||18}}]});
   }catch(err){}
  },650);
 });
}

(async function boot(){
 const missingLibs=["maplibregl","pmtiles","h3","deck"].filter(g=>typeof window[g]==="undefined");
 if(!missingLibs.length&&typeof deck.MapboxOverlay!=="function")missingLibs.push("deck.MapboxOverlay");
 if(missingLibs.length){
  document.getElementById("stamp").innerHTML='<span style="color:#D9480F">libs failed: '+missingLibs.join(", ")+' — hard-refresh</span>';
  return;
 }
 try{const sv=sessionStorage.getItem("atlas_view");if(sv)view={...view,...JSON.parse(sv)};}catch(e){}
 const qs=new URLSearchParams(location.search);
 const deep=qs.get("h");
 if(deep){try{const c=h3.cellToLatLng(deep);view={...view,latitude:c[0],longitude:c[1],zoom:14.6};}catch(e){}}
 map=new maplibregl.Map({container:"map",style:BASEMAP,
  center:[view.longitude,view.latitude],zoom:view.zoom,pitch:view.pitch,bearing:view.bearing,
  minZoom:8.6,maxZoom:17.4,maxPitch:62,maxBounds:[[-74.32,40.46],[-73.62,40.98]],
  attributionControl:{compact:true},antialias:true});
 map.on("move",()=>{const c=map.getCenter();
  view={latitude:c.lat,longitude:c.lng,zoom:map.getZoom(),pitch:map.getPitch(),bearing:map.getBearing()};
  try{sessionStorage.setItem("atlas_view",JSON.stringify(view));}catch(e){}});
 map.on("moveend",maybeNeed);
 map.on("error",e=>{if(e&&e.error)console.error("[map]",e.error.message);});
 map.on("load",()=>{try{
  window.__beforeId=(map.getStyle().layers.find(l=>l.type==="symbol")||{}).id;
  try{
   const proto=new pmtiles.Protocol();maplibregl.addProtocol("pmtiles",proto.tile);
   map.addSource("bldg",{type:"vector",url:"pmtiles://"+TILES});
   map.addLayer({id:"bldg3d",source:"bldg","source-layer":"buildings",type:"fill-extrusion",
    minzoom:BUILDING_ZOOM,paint:{"fill-extrusion-color":"#F1F0ED",
    "fill-extrusion-height":["get","h"],"fill-extrusion-base":0,
    "fill-extrusion-opacity":.8}},window.__beforeId);
   map.addSource("hib",{type:"geojson",data:{type:"FeatureCollection",features:[]}});
   map.addLayer({id:"hib3d",source:"hib",type:"fill-extrusion",
    paint:{"fill-extrusion-color":"#9A9EA4","fill-extrusion-height":["get","h"],
    "fill-extrusion-base":0,"fill-extrusion-opacity":.55,
    "fill-extrusion-opacity-transition":{duration:600}}});
   map.setPaintProperty("bldg3d","fill-extrusion-opacity-transition",{duration:700});
  }catch(e){}
  // deck = renderer only; ALL events flow through maplibre (proven live on every device)
  overlay=new deck.MapboxOverlay({interleaved:false,layers:[]});
  map.addControl(overlay);
  function pickAt(pt,radius){
   if(!overlay)return null;
   try{const i=overlay.pickObject({x:pt.x,y:pt.y,radius:radius});return(i&&i.object)?i:null;}
   catch(err){trace("pick ERR "+String(err.message).slice(0,60));return null;}
  }
  map.on("click",e=>{
   const info=pickAt(e.point,6);
   trace("clk r"+activeRes(view.zoom)+" → "+(info?(info.layer.id+" …"+String(info.object.id).slice(-5)):"∅"));
   if(info)onClick(info);
  });
  let hoverT=0;
  map.on("mousemove",e=>{
   const now=performance.now();if(now-hoverT<70)return;hoverT=now;
   const info=pickAt(e.point,2);
   const id=info&&/^hex-r9/.test(info.layer.id)?info.object.id:null;
   if(id!==hoverId){hoverId=id;redraw();}
   map.getCanvas().style.cursor=info?"pointer":"";
  });
  map.getCanvas().addEventListener("mouseleave",()=>{if(hoverId){hoverId=null;redraw();}});
  loadR5();
  fetch(STATIC+"/fars_points.json").then(r=>r.json()).then(j=>{fars=j;redraw();}).catch(()=>{});
  if(deep)openCard(deep);
  (async function liveLoop(){
   try{
    if(!window.__liveUrl){
     const d=await fetch(LIVE_DISCOVERY,{cache:"no-store"}).then(r=>r.json()).catch(()=>null);
     if(d&&d.url)window.__liveUrl=d.url;
    }
    if(window.__liveUrl){
     const v=await fetch(window.__liveUrl).then(r=>r.ok?r.json():null).catch(()=>null);
     if(v){live=v;redraw();}
     else window.__liveUrl=null;   // tunnel moved — rediscover next tick
    }
   }catch(e){}
   setTimeout(liveLoop,20000);
  })();
 }catch(err){trace("BOOT ERR "+String(err.message).slice(0,80));console.error(err);}});
})();
</script>
