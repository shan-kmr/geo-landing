    // same short seam tail (ascend1=28.7 -> LOOP=29.5 ~= 0.8s). TURNS stays 3
    // (integer) and every periodic oscillator is tPhase=t/LOOP keyed, so the seam
    // stays BYTE-IDENTICAL at the new length (verified: t=0 raster == t=LOOP raster,
    // SwiftShader software raster, exact pixel diff 0). The spin-warp table auto-
    // rebuilds from the new (shifted) morph profile.
    //   v10 SPIN: a ~3s dwell = far less globe-VISIBLE time, so the warp banks even
    //   more rotation in the (unchanged ~10s) flat-city window where the globe is
    //   gone (morph~1) and the spin is INVISIBLE. The shorter loop alone lifts the
    //   visible spin ~7%; raising SPIN_WMIN 0.22->0.27 brings the VISIBLE spin to
    //   ~+25% (turns/s 0.0380 -> 0.0476) — the requested 20-30% faster spin —
    //   WITHOUT touching TURNS (whole integer -> seam byte-identical). The seam
    //   endpoints still sit in the short dwell at the low (WMIN) rate, so the seam
    //   per-frame motion is an ordinary dwell frame (verified: seam frame delta ~=
    //   mid-dwell frame delta), and NO phase boundary spikes: the descend boundary's
    //   per-frame motion is ~0.84x the local dwell median (the spin warp slows the
    //   visible globe through both morphs), well under the 1.5x cap.
    // New beats (loop-local seconds; ALL shifted -5.5s from v9, durations identical):
    //   GLOBE dwell        0.0  - 3.0   (+ seam tail 28.7-29.5 -> ~3s open HOLD)
    //   DESCEND/flatten    3.0  - 12.5  (globe -> grid; SLOW 8.5s morph, UNCHANGED)
    //   PING (traces)      11.5 - 16.5  (fade-in/out spans UNCHANGED cross-dissolves)
    //   RESOLVE            15.0 - 20.2  (in 0.9s / out 2.1s UNCHANGED; lock at 17.5)
    //   FOOTPRINTS SETTLED 18.0 - 22.0  (lift/ebb spans UNCHANGED)
    //   BUILDINGS rise     17.5 - 22.0  (synchronized extrude ~4.5s; UNCHANGED dur)
    //   BUILDINGS recede   22.5 - 25.0  (synchronized descent 2.5s; OVERLAPS ascend)
    //   ASCEND/un-flatten  22.6 - 28.7  (grid -> globe re-curves; SLOW 6.1s morph,
    //                                    UNCHANGED; grid fades out AS globe fades in)
    //   WORLD hold (seam)  28.7 - 29.5  (== open)
    var LOOP = 29.5;
    var B = {
      // descent / flatten (globe -> grid) — SLOW 8.5s morph so the sphere "opens
      // out" gently; its per-frame velocity stays in the ordinary-motion band.
      // v10: starts at 3.0 (MUCH earlier) so the open GLOBE HOLD is only ~3s before
      // it opens out (founder: the opening dwell was too long). morph DURATION
      // (8.5s, flatten0->flatten1 = 4.0->12.5) is UNCHANGED (smoothness-critical);
      // the whole post-dwell timeline is shifted -5.5s with it (loop -> 29.5s).
      descend0: 3.0,
      flatten0: 4.0,
      flatten1: 12.5,
      // grid draws in UNDER the morph and KEEPS drawing into the ping beat so the
      // boundary into PING carries motion (no freeze): a ~7s draw-in that overlaps
      // both the morph tail and the trace fade-in (a cross-dissolve, not a cut).
      gridDraw0: 8.0,
      gridDraw1: 15.0,
      // city traces (PING) — fade IN over a long ramp that OVERLAPS the grid
      // draw-in, hold, then FULLY FADE OUT to 0 over a long ramp that OVERLAPS the
      // RESOLVE fade-in. The fade is on the traces' OWN envelope so the pings are
      // already low (not a hard cut) as the reticle takes over.
      // v9: HOLD trimmed (pings register then leave promptly). fade-in 1.4s and
      // fade-out 2.0s (traceFade1-traceFade0) spans are UNCHANGED cross-dissolves.
      trace0: 11.5,
      traceFade0: 14.5,    // pings begin fading out (2.0s ramp, overlaps resolve-in)
      traceFade1: 16.5,    // pings fully gone — overlaps the resolve build
      heat0: 12.0,
      heatFade0: 14.0,     // density haze fades out alongside the pings (2.5s)
      heatFade1: 16.5,
      // RESOLVE beat: its presence fades IN while the last pings fade OUT (a
      // cross-dissolve), the reticle settles + the lock-ring sweeps closed, then
      // the cue fades OUT while the footprints-settled lift fades IN. resolveLock
      // = the instant the lock reads "engaged". Stretched so every ramp is gentle.
      // v9: the ACQUISITION action is trimmed (settle 4.0->2.5s) so the lock reads
      // promptly — snappier. The ease-IN (0.9s, overlaps the ping fade-out) and the
      // ease-OUT (2.1s = resolveGone-resolve1, overlaps the settled lift + rise) are
      // UNCHANGED cross-dissolves. Lock lands at 23.0 (== rise0) so it reads exactly
      // as the buildings launch; resolveGone (25.7) overlaps the rise (cross-fade).
      resolve0: 15.0,       // reticle begins settling (pings still leaving -> overlap)
      resolveLock: 17.5,    // lock-ring full, brackets tight, point resolved
      resolve1: 18.1,       // lock reads engaged; resolve begins easing out
      resolveGone: 20.2,    // resolve fully gone — overlaps the settled lift + rise
      // zoom into the focus block (camera push toward the resolved point), eased
      // so RESOLVE settles over the block and the push holds through the settled
      // beat and the synchronized rise, then pulls back out on recede.
      zoom0: 15.5,
      zoom1: 21.5,
      // place massing — SYNCHRONIZED rise (all blocks together on ONE timeline),
      // a brief crest (carries a faint breath, NOT a frozen hold), then a
      // synchronized recede. BUILDINGS ARE THE LAST CONTENT BEAT. The rise LAUNCHES
      // at 30.0 OVERLAPPING the footprints-settled lift (a cross-dissolve), every
      // block shares the SAME rise progress (stageBlocks() sets riseDelay = 0 for
      // all), each eased with smootherstep, so the whole city crests together. The
      // base map dims through the rise so the synchronized massing owns a near-
      // empty field. SLOW 6.5s extrude so the per-frame growth is gentle; tops
      // out, brief crest, then recedes (overlapping the ascent), fully back to
      // flat before the ascent completes (seam-safe).
      // v9: the extrude/recede HOLDS are trimmed (rise 6.0->4.5s, recede 2.8->2.5s)
      // so the building beat is snappier per the founder; both edges stay
      // smootherstep-eased (zero velocity at rise0, crest, recede start, landing) so
      // the synchronized massing still crests TOGETHER with no snap. rise0 (23.0)
      // OVERLAPS the settled lift + resolve-out (cross-dissolves); the brief 0.5s
      // crest keeps "buildings LAST"; recede OVERLAPS the ascend-in.
      rise0: 17.5,
      rise1: 22.0,          // gentle ~4.5s synchronized extrude on the clean field
      recede0: 22.5,        // brief crest (buildings LAST) then synchronized recede
      recede1: 25.0,        // gentle ~2.5s synchronized descent back toward the grid
                            // (kept short enough that the building recede finishes
                            // BEFORE the ascend morph's fast middle, so the two do
                            // not pile up; the per-building sink is smoothed by the
                            // wider hFade band below + the smootherstep height ease)
      // pull back out of the block — overlaps the recede so the camera glides out
      unzoom0: 22.0,
      unzoom1: 27.5,
      // ascent / un-flatten (grid -> globe) — SLOW ~6.1s, made SYMMETRIC with the
      // 8.5s descend (was only 3.8s, so its per-frame morph velocity was ~2x the
      // descend's -> the ASCEND boundary spiked at ~2x the descend's). It OVERLAPS
      // the recede so the grid fades out AS the globe fades back in (cross-
      // dissolve, no swap); reaches the sphere (morph=0) by ~34.2 with a short
      // dwell tail before the seam. v9: DURATION (6.1s) UNCHANGED (smoothness-
      // critical transition); only shifted in time.
      ascend0: 22.6,
      ascend1: 28.7,
      gridGone: 28.5
    };

    // morphCity: 0 = full globe (sphere) .. 1 = full city (dots on flat grid).
    function morphCity(t) {
      var down = ramp(t, B.flatten0, B.flatten1);
      var up = ramp(t, B.ascend0, B.ascend1);
      return clamp01(down - up);
    }

    // ============================================================
    // SPIN-RATE WARP (v8) — the globe spins SLOWER through the morphs.
    // The single biggest motion in the loop is the GLOBE SPIN: a half-formed
    // globe (dots part-translated, coast/grat part-faded) spinning at the dwell
    // rate moves the screen ~2x as much per frame as a clean spinning sphere, so
    // the GLOBE<->CITY morph boundaries exceeded ordinary motion. Slowing the morph
    // DURATION did nothing (the spin is constant-rate); the fix is to slow the
    // SPIN ITSELF where the globe is mid-morph, and (to keep whole turns) spin a
    // touch FASTER during the dwell. That makes the per-frame motion UNIFORM across
    // dwell and morph — exactly "boundaries move no more than ordinary motion".
    //
    // We warp loop phase p in [0,1] -> S(p) in [0,1] with S(0)=0, S(1)=1, and use
    // ang = 2*pi*TURNS*S(p). KEY IDEA: spin SLOW while the globe is VISIBLE (the
    // dwell + both morphs, morph < ~0.9) and FAST while the city is FLAT (morph
    // ~ 1, where the globe shell/dots are gone and the spin is INVISIBLE). The
    // flat-city span (PING/RESOLVE/BUILDINGS ~ 20s) absorbs most of the rotation
    // unseen, so the visible globe spins at roughly HALF rate -> the dwell, the
    // seam, AND the half-formed morph all move far less per frame, landing in the
    // ordinary-motion band, with NO change to the number of whole turns (the table
    // is renormalised so it is still exactly TURNS). Endpoints sit in the dwell
    // (same low rate at t=0 and t=LOOP) so velocity matches across the seam ->
    // byte-identical + smooth. Built once (deterministic); S(0)=0, S(1)=1 exact.
    // v9: 0.34 -> 0.22. The v9 ENLARGED globe dwell + SHORTER loop means the globe
    // completes its 3 whole turns in less flat-city time, so the VISIBLE spin crept
    // up and the descend boundary's per-frame motion rose. Lowering the visible-spin
    // weight slows the dwell/morph spin back down (the extra rotation is absorbed in
    // the still-ample flat-city window where morph~1 and the spin is INVISIBLE), so
    // every phase boundary's per-frame delta sits at ~1.0x the local within-beat
    // motion (verified) — no pops. Seam endpoints still sit in the dwell, so the
    // seam stays byte-identical.
    // v10: 0.22 -> 0.27 to SPEED the visible spin (founder: spin the globe faster).
    // The v10 ~3s dwell cuts the globe-VISIBLE time hard, so the warp banks even more
    // rotation in the (unchanged ~10s) flat-city window where the globe is gone and
    // the spin is INVISIBLE — that shorter loop alone lifts the visible spin ~7%.
    // Raising WMIN to 0.27 brings the VISIBLE rate to ~+25% over v9 (turns/s
    // 0.0380 -> 0.0476), the requested 20-30% faster spin, WITHOUT touching TURNS
    // (kept whole integer 3 -> seam byte-identical). Crucially the visible spin is
    // still SLOW enough that the descend boundary does NOT spike: its per-frame
    // motion measures ~0.84x the local dwell median (verified at the software
    // raster), and the seam endpoints stay in the short dwell at this low WMIN rate
    // so the seam per-frame motion is an ordinary dwell frame -> byte-identical.
    var SPIN_WMIN = 0.27;     // spin-rate weight while the globe is VISIBLE (slow)
    var SPIN_PH0 = 2.0;       // constant seam orientation offset (tuned: lands the
                              // seam + morph orientations in low per-frame-motion
                              // configs — the dwell delta is oscillatory in angle).
    var SPIN_N = 4400;        // table resolution over the loop (~0.0067s at LOOP=29.5)
    var spinCum = new Float64Array(SPIN_N + 1);
    (function buildSpinWarp() {
      var i, total = 0;
      var w = new Float64Array(SPIN_N + 1);
      for (i = 0; i <= SPIN_N; i++) {
        var tt = (i / SPIN_N) * LOOP;
        var m = morphCity(tt);
        // visible (morph<0.9): WMIN (slow). flat/invisible (morph~1): 1 (full
        // rate) -> carries the bulk of the turns unseen. smootherstep transition.
        var vis = smoother(clamp01((m - 0.86) / 0.14));   // 0 visible .. 1 flat
        w[i] = SPIN_WMIN + (1 - SPIN_WMIN) * vis;
      }
      // trapezoidal cumulative integral
      spinCum[0] = 0;
      for (i = 1; i <= SPIN_N; i++) {
        total += (w[i] + w[i - 1]) * 0.5;
        spinCum[i] = total;
      }
      for (i = 0; i <= SPIN_N; i++) spinCum[i] /= total;   // normalise -> S(1)=1
      spinCum[0] = 0; spinCum[SPIN_N] = 1;                 // exact endpoints (seam)
    })();
    // S(p): warped phase in [0,1], linear-interpolated from the table.
    function spinPhase(p) {
      var x = clamp01(p) * SPIN_N;
      var i0 = x | 0; if (i0 >= SPIN_N) return 1;
      var f = x - i0;
      return spinCum[i0] + (spinCum[i0 + 1] - spinCum[i0]) * f;
    }

    // globeRadius: grow the live radius as we descend so front-face curvature
    // flattens (the sphere "opens out" into the city), and a gentle breathing
    // push-in while the world holds. Returns the live radius.
    function globeRadius(t) {
      var m = morphCity(t);
      // Breathing keyed off the LOOP PHASE (whole number of cycles per loop) so
      // the globe radius is byte-identical at the seam (t=0 == t=LOOP). 4 whole
      // cycles over the loop (~7.4s period at LOOP=29.5) -> seam-exact regardless
      // of loop length.
      var breathe = 0.035 * Math.sin((t / LOOP) * Math.PI * 2 * 4);
      // v8: MUCH gentler balloon (was 1.35). During the morph the land-dots
      // already TRANSLATE from sphere->grid positions; growing the radius on TOP
      // of that made every dot sweep a huge screen distance PER FRAME (the radius
      // alone shrank ~14px/frame at the morph midpoint), so the GLOBE<->CITY
      // boundary spiked far above ordinary motion. With a small growth the sphere
      // positions stay close to the grid scale, so the morph's per-frame pixel
      // travel drops into the ordinary band. curvature() still does the actual
      // front-face flattening, so the sphere visibly "opens out" regardless.
      var mult = 1.0 + 0.15 * smoother(m);
      return R * (1 + breathe) * mult;
    }

    // curvature (shell strength): 1 = full sphere .. 0 = flat. Coast / grat /
    // rim fade against this so no stray rim rings the streets.
    // v8: the sphere-only line elements (coastline, graticule, rim, disc) fade out
    // EARLY in the morph (gone by morph~0.5) rather than lingering to morph~1.
    // Those lines are PURE sphere projections, so they keep moving at the full
    // spin rate the whole time they are visible; lingering them through the spin-
    // heavy middle of the morph was a big part of why the GLOBE<->CITY boundary
    // moved more than ordinary motion. Clearing them early leaves mostly the land-
    // dots (which, once translated to the fixed grid, stop being spin-driven), so
    // the morph's per-frame motion drops toward the ordinary (dwell-spin) band.
    // Still C2 (smootherstep) and 0/1 at the seam ends, so seam stays exact.
    function curvature(t) {
      return 1 - smoother(clamp01(morphCity(t) / 0.5));
    }

    // placeRise: 0 = flat grid footprints .. 1 = full synchronized massing.
    // The SINGLE global rise progress shared by EVERY block (there is no per-block
    // stagger any more — see stageBlocks/drawCityExtrude). v7 (SYNCHRONIZED RISE):
    // a clean up-window, a brief hold at full (so the buildings LAST), then a
    // recede-window. Both edges are LINEAR here; every consumer wraps this in a
    // smootherstep (the per-block extrude is smoother(rise01), the grid/heat fades
    // use smoother(rise)), so the actual building HEIGHT eases in and out with
    // zero velocity at rise0, at the crest, at the recede start, and at the
    // landing — a gentle, snap-free ease-in-out where the whole city rises and
    // crests TOGETHER. Seam-safe: 0 at both ends. Independent of the globe morph.
    function placeRise(t) {
      var up = clamp01((t - B.rise0) / (B.rise1 - B.rise0));   // synchronized climb (eased by smoother() at use)
      var down = clamp01((t - B.recede0) / (B.recede1 - B.recede0)); // synchronized recede after a brief hold
      return clamp01(up - down);
    }

    // isoFade: how present the isometric massing layer is (cross-fade weight).
    // Comes in slightly before the rise so footprints hand off cleanly, holds
    // through the alive beat, fades out on recede as the grid resumes.
    function isoFade(t) {
      var inF = ramp(t, B.zoom0 + 0.25, B.rise0 + 0.35);
      var outF = 1 - ramp(t, B.recede1 - 0.2, B.unzoom1);
      return clamp01(Math.min(inF, outF));
    }

    // ============================================================
    // BASE-MAP FADE (founder fix — ONE dominant element per beat).
    // The clutter that survived the prior two passes was the STATIC base map:
    // the dotted STREET GRID (avenues + cross-streets + Broadway diagonal +
    // nodes) and the FOOTPRINT rects stayed at near-full prominence right
    // through RESOLVE and BUILDINGS, so the reticle/lock-ring and the rising
    // buildings never stood out — the whole frame read as a busy dotted grid.
    // (Earlier passes only faded the MOVING traces/pings, not this base map.)
    //
    // baseMapFade(t) DIMS the streets' AND footprints' alpha so each late beat
    // sits on a near-empty field, with ONE deliberate exception — the
    // FOOTPRINTS-SETTLED beat, where the footprints LIFT back to clearly visible
    // (so the founder's "all footprints in place" reads) just before the city
    // rises. Every transition is smootherstep/smoothstep (C2/C1-continuous, no
    // snaps). v8: every ramp here is LONGER (gentler) and the down/up edges OVERLAP
    // the neighbouring beats so the base-map dim is itself a cross-dissolve, never
    // a step. Profile over the loop (44s):
    //   PING beat (<= ~22s)                  : 1.0  — grid bright, as before.
    //   RESOLVE beat (~22 -> ~27)            : ramps DOWN slowly to BASE_FLOOR
    //       (~0.10) so streets + footprints are barely-there and the reticle +
    //       lock-ring dominate a near-empty field. Floor before the lock (27.5).
    //   FOOTPRINTS SETTLED (28.5 -> 31)      : LIFTS the base map back up to
    //       SETTLE_VIS (~0.50) so EVERY footprint is clearly visible on the grid,
    //       a GENTLE fade-UP (>=0.9s), never a flash — the "all footprints
    //       settled" read, overlapping the resolve fade-out and the rise launch.
    //   BUILDINGS rise/crest/recede (30 ->)  : dims back to BASE_FLOOR (~0.10) so
    //       the SYNCHRONIZED rise reads clearly on near-empty ground.
    //   ASCEND / loop-back                   : ramps back UP to 1.0 slowly so the
    //       grid fades back in AS the globe re-forms (cross-dissolve).
    // The down-ramp begins as the pings leave (traceFade ~22) and the up-ramp as
    // the buildings recede; both are long so nothing steps. Everything cross-fades.
    var BASE_FLOOR = 0.10;   // streets/footprints alpha multiplier during resolve & the rise (~90% faded)
    var SETTLE_VIS = 0.50;   // streets/footprints alpha at the FOOTPRINTS-SETTLED beat (clearly visible)
    // v9: every absolute time below is shifted onto the snappier timeline; the
    // ramp SPANS are kept gentle/long (cross-dissolves) so the base-map dim never
    // steps.
    var BMF = {
      down0: 20.0,   // begin dimming (pings leaving) — long, overlaps resolve in
      down1: 22.7,   // fully at BASE_FLOOR — before resolveLock (23.0)
      // v8: restore the grid brightness over a LONG, GENTLE ramp spanning the
      // whole recede+ascend so its per-frame alpha contribution is small. Note the
      // FLATTENED land-dots' dim is gated by *morph* (see drawGlobe gridDotFade),
      // so as the un-flatten takes morph 1->0 the dim influence fades out on its
      // own — the restore ramp need not race the morph. Spreading it this wide (vs
      // a 3s 10x swing colliding with the morph) keeps the ASCEND region's motion
      // in the ordinary band; it reaches 1.0 by the seam tail (seam stays 1.0).
      up0:   30.0,   // begin restoring (buildings receding)
      up1:   34.2,   // grid fully back by the seam tail (long, gentle)
      // FOOTPRINTS-SETTLED lift: brighten the base map back to SETTLE_VIS as the
      // resolve clears (a GENTLE >=1.5s fade-UP, never a flash), CREST briefly
      // (30.0->30.2, overlapping resolveGone 30.4 and rise0 29.5) then CONTINUOUSLY
      // ebb away over >=2.3s as the city rises. v8: the crest is a brief PEAK, not a
      // flat hold, so the grid brightness keeps changing through the resolve->rise
      // hand-off (no static gap there); footprints fade smoothly, never a pop.
      settle0: 23.5, settle1: 25.0, settle2: 25.2, settle3: 28.5
    };
    function baseMapFade(t) {
      var down = smoother((t - BMF.down0) / (BMF.down1 - BMF.down0)); // 0 -> 1 dim
      var up   = smoother((t - BMF.up0)   / (BMF.up1   - BMF.up0));   // 0 -> 1 restore
      var dim  = down * (1 - up);   // 1 only in the RESOLVE+SETTLED+BUILDINGS trough, 0 outside
      // settled bump: lifts the dimmed band from BASE_FLOOR toward SETTLE_VIS so
      // all footprints are clearly visible for the "settled" beat, then falls so
      // the synchronized rise owns a near-empty field.
      var bump = pulse(t, BMF.settle0, BMF.settle1, BMF.settle2, BMF.settle3);
      var troughA = lerp(BASE_FLOOR, SETTLE_VIS, bump); // alpha inside the dimmed band
      return 1 - (1 - troughA) * dim;                   // == 1.0 outside the band
    }

    // lockAnchor(t): during the RESOLVE the single LOCKED block may stay
    // marginally more visible than the rest of the dimmed base map, to anchor
    // the lock. Returns 0..1 (peaks across the lock, gone before the buildings
    // rise). Applied ONLY to the focus block's footprint inside drawGrid, and
    // only as a partial lift toward full — so the field stays near-empty.
    function lockAnchor(t) {
      // present across the resolve window; gated by the same envelope as the
      // resolve cue (zero before resolve0-ish and by resolveGone), and only
      // where the base map is actually dimmed (so it never lifts during PING).
      var inA  = smoother((t - (B.resolve0 - 0.4)) / 0.9);
      var outA = 1 - smoother((t - B.resolve1) / (B.resolveGone - B.resolve1));
      return clamp01(Math.min(inA, outA));
    }

    // ============================================================
    // RESOLVE BEAT (ported + smoothed from the-resolve-clean.html).
    // The scattered city activity CONVERGES and LOCKS onto ONE focal point
    // (the focus block centre): a reticle of corner-brackets settles + tightens,
    // a lock-ring sweeps closed, and the GPS pings draw toward that point. Every
    // envelope below is a single C2 smootherstep ramp so nothing snaps — the
    // founder's "lags in frames" came from discrete ticks; here velocity is
    // continuous across every boundary. The whole beat fades fully out before the
    // buildings rise (buildings are the LAST content beat).
    //
    // resolveEnv(t) -> { settle, lock, sweep, conv, A }
    //   settle : 0..1 reticle moves from loose+wide to tight+over-the-point
    //   lock   : 0..1 bracket weight / engage notches (reads "locked")
    //   sweep  : 0..1 fraction of the lock-ring drawn (sweeps closed)
    //   conv   : 0..1 how strongly the scattered pings are pulled to the point
    //   A      : 0..1 overall presence (eased in, holds, eased out before rise)
    function resolveEnv(t) {
      var r0 = B.resolve0, rL = B.resolveLock, r1 = B.resolve1;
      // v6: the resolve must be FULLY out by resolveGone (before the buildings
      // rise) and FULLY zero before resolve0 (after the pings have gone) — so it
      // never overlaps the ping or the building beats. Hard guard outside that.
      if (t <= r0 - 0.8 || t >= B.resolveGone) {
        return { settle: 0, lock: 0, sweep: 0, conv: 0, A: 0 };
      }
      // presence: ease in just before settle (on the clean grid), hold through
      // the lock, then ease FULLY out by resolveGone — well before the rise.
      var inA  = smoother((t - (r0 - 0.8)) / 0.9);
      var outA = 1 - smoother((t - r1) / (B.resolveGone - r1));
      var A = clamp01(Math.min(inA, outA));
      // settle: brackets converge inward across resolve0 -> resolveLock.
      var settle = smoother((t - r0) / (rL - r0));
      // lock: engages over the back half of the settle, full at resolveLock.
      var lock = smoother((t - lerp(r0, rL, 0.45)) / (rL - lerp(r0, rL, 0.45)));
      // sweep: the lock-ring closes slightly behind the settle, full at the lock.
      var sweep = smoother((t - lerp(r0, rL, 0.18)) / (rL - lerp(r0, rL, 0.18)));
      // conv: pings get drawn toward the point across the whole settle, then stay
      // pinned through the hold (so they don't spring back before the lock reads).
      var conv = smoother((t - r0) / (rL - r0));
      return { settle: settle, lock: lock, sweep: sweep, conv: conv, A: A };
    }

    // Acquisition reticle: four corner brackets that settle inward AND visibly
    // LOCK — arms go from loose+thin to tight+solid. `lock` drives weight/notches.
    function reticle(cx, cy, half, a, lock, centerTick) {
      if (a <= 0.003) return;
      ctx.save();
      var lw = lerp(1.0, 2.1, clamp01(lock));
      ctx.strokeStyle = cob(a.toFixed(3));
      ctx.lineWidth = lw;
      ctx.lineCap = "round";
      ctx.lineJoin = "round";
      var L = half * 0.42;
      var corners = [[-1, -1], [1, -1], [-1, 1], [1, 1]];
      var i;
      for (i = 0; i < 4; i++) {
        var sx = corners[i][0], sy = corners[i][1];
        var x = cx + sx * half, y = cy + sy * half;
        ctx.beginPath();
        ctx.moveTo(x - sx * L, y);
        ctx.lineTo(x, y);
        ctx.lineTo(x, y - sy * L);
        ctx.stroke();
      }
      // inward "engage" notches grow in (length AND alpha) over the lock's upper
      // half via smootherstep — never pop on.
      if (lock > 0.5) {
        var k = smoother((lock - 0.5) / 0.5);
        var na = a * k;
        var nt = half * 0.16 * k;
        var nin = half - half * 0.30;
        ctx.lineWidth = lerp(1.0, 1.8, clamp01(lock));
        for (i = 0; i < 4; i++) {
          var cx2 = corners[i][0], cy2 = corners[i][1];
          var by = cy + cy2 * half;
          ctx.strokeStyle = cob(na.toFixed(3));
          ctx.beginPath();
          ctx.moveTo(cx + cx2 * nin, by);
          ctx.lineTo(cx + cx2 * nin - cx2 * nt, by);
          ctx.stroke();
        }
      }
      if (centerTick) {
        var tk2 = 4;
        ctx.lineWidth = 1;
        ctx.strokeStyle = cob((a * 0.6).toFixed(3));
        ctx.beginPath(); ctx.moveTo(cx - tk2, cy); ctx.lineTo(cx + tk2, cy); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(cx, cy - tk2); ctx.lineTo(cx, cy + tk2); ctx.stroke();
      }
      ctx.restore();
    }

    // Lock ring: a thin arc that SWEEPS closed around the resolved point. The
    // sweep completion is smootherstep (zero velocity at full) so it glides shut
    // instead of stepping closed.
    function lockRing(x, y, r, sweep, a) {
      if (a <= 0.003 || sweep <= 0) return;
      ctx.save();
      ctx.strokeStyle = cob(a.toFixed(3));
      ctx.lineWidth = lerp(1.0, 1.8, clamp01(sweep));
      ctx.lineCap = "round";
      var start = -Math.PI / 2;
      var end = start + Math.PI * 2 * clamp01(sweep);
      ctx.beginPath();
      ctx.arc(x, y, r, start, end);
      ctx.stroke();
      ctx.restore();
    }

    // Convergence pings: a faint cloud of points that (during the resolve) are
    // pulled from scattered city positions toward the focal point and fade INTO
    // it — the "scattered activity converges and locks". Phase-locked oscillators
    // (driven by loop-local t) keep the seam identical. No per-frame allocation
    // beyond the draw calls. TEXT-FREE: pure dots/arcs.
    var RES_N = 22;
    var resCloud = [];
    (function buildResCloud() {
      for (var i = 0; i < RES_N; i++) {
        var ang = rnd() * Math.PI * 2;
        var rad = Math.pow(rnd(), 0.6) * 150;     // spread across the city
        resCloud.push({
          ox: Math.cos(ang) * rad * 1.15,
          oy: Math.sin(ang) * rad * 0.8,
          jr: 4 + rnd() * 7,
          ph: rnd() * Math.PI * 2,
          sp: 0.8 + rnd() * 1.3,
          a: 0.16 + rnd() * 0.26
        });
      }
    })();

    function drawResolve(t, env) {
      if (env.A <= 0.003) return;
      var fx = FOCUS.cx, fy = FOCUS.cy;     // the ONE resolved focal point
      var conv = env.conv;
      // jitter clock is loop-local (t) so the scatter is seam-periodic.
      var jt = t;
      ctx.save();
      var i;
      for (i = 0; i < resCloud.length; i++) {
        var p = resCloud[i];
        var jitterScale = (1 - conv);
        var jr = p.jr * jitterScale;
        var jx = Math.cos(jt * p.sp + p.ph) * jr;
        var jy = Math.sin(jt * p.sp * 1.13 + p.ph * 1.7) * jr;
        var sxp = fx + p.ox + jx;
        var syp = fy + p.oy + jy;
        var px = lerp(sxp, fx, conv);
        var py = lerp(syp, fy, conv);
        var aBase = p.a * env.A;
        var aConv = aBase * (1 - 0.5 * conv);
        if (conv > 0.82) aConv *= (1 - (conv - 0.82) / 0.18);
        var rr = lerp(1.7, 1.2, conv);
        if (aConv > 0.004) {
          ctx.beginPath();
          ctx.fillStyle = cob(clamp01(aConv).toFixed(3));
          ctx.arc(px, py, rr, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.restore();

      // reticle: settles from loose+wide (half ~150) to tight (half ~38) over the
      // focal point, weight rising with the lock. Alpha eased by overall presence.
      var half = lerp(150, 38, smoother(env.settle));
      // a gentle phase-locked "breathe" once locked (amplitude eased in with lock).
      half += Math.sin(t * 2.1) * 1.4 * env.lock;
      var retA = env.A * lerp(0.0, 0.82, smoother(clamp01(env.settle * 1.05)));
      reticle(fx, fy, half, retA, env.lock, env.lock > 0.25);

      // lock-ring sweeps closed around the point; alpha follows presence + sweep.
      var ringA = env.A * 0.88 * smoother(clamp01(env.sweep * 1.1));
      lockRing(fx, fy, 10.0, env.sweep, ringA);

      // resolved core: a clean filled dot with a thin inner ring that tightens at
      // full lock — the "found one thing" cue. Fades in with the convergence.
      var coreA = env.A * smoother(clamp01((conv - 0.45) / 0.55));
      if (coreA > 0.004) {
        ctx.save();
        var innerR = lerp(5.0, 4.3, clamp01(env.lock));
        ctx.strokeStyle = cob((0.6 * coreA).toFixed(3));
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(fx, fy, innerR, 0, Math.PI * 2); ctx.stroke();
        var coreR = lerp(2.3, 2.7, clamp01(env.lock));
        ctx.fillStyle = cob(clamp01((0.9 + 0.06 * env.lock) * coreA).toFixed(3));
        ctx.beginPath(); ctx.arc(fx, fy, coreR, 0, Math.PI * 2); ctx.fill();
        ctx.restore();
      }
    }

    // ============================================================
    // CAMERA — single continuous descending-then-ascending move.
    // Stage A: globe push-in is carried by globeRadius (no transform).
    // Stage B (city -> block): a canvas zoom about the FOCUS block centre
    // that pushes IN so the block fills the frame, then pulls back OUT.
    // We compose: a mild city push (1.0 -> ~1.12) during the flatten, then a
    // deeper push into the focus block (-> ~3.1) for the place beat, then back.
    // All eased so the move never pops.
    // ============================================================
    function cameraCity(t) {
      // gentle push toward the grid centre during the flatten (descent feel)
      var z = smoother(morphCity(t));
      return lerp(1.0, 1.12, z);
    }
    function cameraBlock(t) {
      // GENTLE push toward the focus block for the place beat, reversed after.
      // Capped LOW (founder feedback): buildings must stay small and in the
      // background — the block occupies maybe the right third, never the whole
      // frame. So the whole grid stays visible and the massing reads modest.
      var inZ = ramp(t, B.zoom0, B.zoom1);
      var outZ = ramp(t, B.unzoom0, B.unzoom1);
      var z = clamp01(inZ - outZ);
      return { amt: smoother(z), s: lerp(1.0, 1.42, smoother(z)) };
    }

    // ============================================================
    // DRAW: STREET GRID (scene-1, centered).
    // ============================================================
    function drawGrid(draw01, globalAlpha, riseFrac, baseFade, anchor) {
      if (globalAlpha <= 0.003) return;
      var rf = riseFrac || 0;             // how much the footprints have risen
      // baseFade (0..1): the BASE-MAP FADE — dims the WHOLE static base map
      // (streets + footprints + diagonal + nodes) so the RESOLVE reticle and the
      // rising BUILDINGS each own a near-empty field. 1 = full grid (PING), down
      // to ~0.12 across RESOLVE/BUILDINGS, back to 1 on ascent. See baseMapFade().
      var bmf = (baseFade == null) ? 1 : baseFade;
      var anch = anchor || 0;             // 0..1 lift for the single LOCKED block
      // Change #3: the ENTIRE street grid (footprint blocks + avenues + cross-
      // streets + Broadway diagonal + nodes) fades INVERSELY to the building
      // rise. As placeRise goes 0->1 the whole grid fades full->0, so when the
      // buildings are fully up ONLY the clean massing shows (no streets behind
      // them); as they recede (1->0) the grid fades back in. Change #1: GRID_AMP
      // restores (un-halves) the alphas to a readable middle ground.
      var riseFade = 1 - smoother(rf);
      // The base-map fade multiplies the rise fade so the streets/footprints dim
      // for RESOLVE/BUILDINGS on top of the existing rise dimming (cross-faded).
      var A = globalAlpha * GRID_AMP * riseFade * bmf;
      if (A <= 0.003 && anch <= 0.003) { return; } // grid fully suppressed
      ctx.save();
      ctx.lineCap = "round";
      // Footprints: dimmed by the base map like everything else, EXCEPT the
      // single locked block, which may stay marginally more visible (anchor) to
      // hold the lock. The anchor lifts ONLY that block's footprint partway back
      // toward full — the rest of the field stays near-empty.
      var blockBase = ramp(draw01, 0.35, 1.0) * globalAlpha * GRID_AMP * riseFade; // pre-baseFade
      var blockA = blockBase * bmf;
      // lifted alpha for the locked block: blend the dimmed value toward the
      // (brighter) un-dimmed value by a fraction of the anchor weight, so it is
      // marginally — not fully — more present than the dimmed grid.
      var lockBoost = anch * 0.55;        // partial lift (keeps the field empty)
      var blockLockA = lerp(blockA, blockBase, clamp01(lockBoost));
      if (blockA > 0.004 || blockLockA > 0.004) {
        for (var i = 0; i < blocks.length; i++) {
          var bl = blocks[i];
          // is this the LOCKED block? (its centre falls inside the FOCUS rect)
          var bcx = bl.x + bl.w * 0.5, bcy = bl.y + bl.h * 0.5;
          var isLock = (lockBoost > 0.004) &&
                       bcx >= FOCUS.x0 && bcx <= FOCUS.x1 &&
                       bcy >= FOCUS.y0 && bcy <= FOCUS.y1;
          var ba = isLock ? blockLockA : blockA;
          if (ba <= 0.004) continue;
          ctx.fillStyle = cob((0.024 * ba).toFixed(3));
          ctx.fillRect(bl.x, bl.y, bl.w, bl.h);
          ctx.lineWidth = 0.6;
          ctx.strokeStyle = cob((0.04 * ba).toFixed(3));
          ctx.strokeRect(bl.x, bl.y, bl.w, bl.h);
        }
      }
      for (i = 0; i < AVENUES.length; i++) {
        var av = AVENUES[i];
        var local = clamp01((draw01 - i * 0.04) / 0.55);
        if (local <= 0) continue;
        var yEnd = lerp(GY0, GY1, smooth(local));
        ctx.beginPath();
        ctx.moveTo(av.x, GY0);
        ctx.lineTo(av.x, yEnd);
        ctx.lineWidth = av.major ? 2.4 : 1.1;
        ctx.strokeStyle = cob(((av.major ? 0.17 : 0.10) * A).toFixed(3));
        ctx.stroke();
      }
      for (i = 0; i < STREETS.length; i++) {
        var stt = STREETS[i];
        var local2 = clamp01((draw01 - 0.18 - i * 0.04) / 0.55);
        if (local2 <= 0) continue;
        var xEnd = lerp(GX0, GX1, smooth(local2));
        ctx.beginPath();
        ctx.moveTo(GX0, stt.y);
        ctx.lineTo(xEnd, stt.y);
        ctx.lineWidth = stt.major ? 2.0 : 1.1;
        ctx.strokeStyle = cob(((stt.major ? 0.16 : 0.10) * A).toFixed(3));
        ctx.stroke();
      }
      var dloc = clamp01((draw01 - 0.3) / 0.6);
      if (dloc > 0) {
        var ex = lerp(BWY.x0, BWY.x1, smooth(dloc));
        var ey = lerp(BWY.y0, BWY.y1, smooth(dloc));
        ctx.beginPath();
        ctx.moveTo(BWY.x0, BWY.y0);
        ctx.lineTo(ex, ey);
        ctx.lineWidth = 2.2;
        ctx.strokeStyle = cob((0.15 * A).toFixed(3));
        ctx.stroke();
      }
      var nodeA = ramp(draw01, 0.55, 1.0) * A;
      if (nodeA > 0.01) {
        ctx.fillStyle = cob((0.11 * nodeA).toFixed(3));
        for (i = 0; i < nodes.length; i++) {
          ctx.beginPath();
          ctx.arc(nodes[i].x, nodes[i].y, 1.1, 0, Math.PI * 2);
          ctx.fill();
        }
      }
      ctx.restore();
    }

    // ============================================================
    // DRAW: IN-PLACE CITY EXTRUDE (Change #1).
    // The buildings rise CONTINUOUSLY and smoothly UP out of the grid's OWN
    // flat footprint blocks — the same {x,y,w,h} rects drawGrid draws — in the
    // SAME design-space coordinates. No separate layer, no projection switch,
    // no pop: the flat footprints grow upward (screen-space vertical extrude
    // with a light 2.5D depth) into massing, eased with smoothstep, then settle
    // back down to flat. rise01 is the global PLACE envelope (0 flat .. 1 full).
    // A is an overall faintness/presence weight; tPhase drives lit-window flicker.
    // ============================================================
    var EXT = {
      depthX: -3.2,   // roof back-offset x (screen px) — hint of depth, up-left
      depthY: -2.2,   // roof back-offset y (screen px)
      // base cobalt face washes (low); scaled up by EXT_AMP (Change #1) at draw
      // time over a paper-opaque underlay (Change #3) so the massing reads solid.
      fFront: 0.085, fTop: 0.055, fSide: 0.115,
      sFront: 0.26,  sTop: 0.22,  sSide: 0.24, sEdge: 0.30
    };
    function drawCityExtrude(rise01, A, tPhase) {
      if (A <= 0.003 || rise01 <= 0.0001) return;
      ctx.save();
      ctx.lineJoin = "round";
      ctx.lineCap = "round";
      var n = blocks.length;
      var dx = EXT.depthX, dy = EXT.depthY;
      // back-to-front: taller-y (front) last so nearer buildings overlap farther.
      var order = blocks._order;
      if (!order) {
        order = blocks._order = blocks.map(function (b, i) { return i; });
        order.sort(function (a, b2) {
          return (blocks[a].y + blocks[a].h) - (blocks[b2].y + blocks[b2].h);
        });
      }
      for (var oi = 0; oi < n; oi++) {
        var b = blocks[order[oi]];
        // v7 SYNCHRONIZED RISE: every block shares the SAME rise progress. With
        // riseDelay pinned to 0 (stageBlocks) the local rise is identical for ALL
        // blocks — smoother(rise01) — so they rise and crest TOGETHER (no wave, no
        // stagger, no per-block popping). Each block's own extrude stays eased by
        // a smootherstep (C2: zero velocity at both ends) so the synchronized rise
        // is gentle, not a hard jump; the global placeRise() supplies the brief
        // hold at the crest (buildings LAST) and the synchronized recede.
        var local = smoother(clamp01((rise01 - b.riseDelay) / (1 - b.riseDelay)));
        if (local <= 0.0001) continue;
        // v8 LIVING SKYLINE breath: a tiny, per-building, loop-periodic height
        // pulse so the buildings are NEVER a frozen frame — most importantly at
        // the CREST (the "buildings last" hold), which would otherwise sit dead-
        // static for ~0.5s and read as a fixed frame. Scaled by local*local so it
        // is ~0 on the ground (no effect on the emerge) and largest at full height.
        // Phase per building (litSeed) so the skyline shimmers organically; whole
        // number of cycles over the loop -> byte-identical at the seam.
        var breath = 1 + 0.045 * local * local * Math.sin(tPhase * (Math.PI * 2) * 9 + (b.litSeed % 1000) * 0.0314159);
        var H = b.eh * local * breath;              // current extruded height (px up)
        // v8: SMOOTH emerge/sink. The old `if (H < 0.3) continue;` HARD-CUT each
        // building on at ~0.3px and off at ~0.3px. With the SYNCHRONIZED rise every
        // block shares the same `local`, so on the recede they ALL crossed that
        // threshold within ~one frame -> a big block of opaque building faces (and
        // their PAPER underlay) blinked back to grid at once: a visible POP exactly
        // at the recede (the founder's "fixed frame" pop). Instead, fade the WHOLE
        // building (paper underlay + washes + edges + windows, via globalAlpha)
        // smoothly in from H=0 and out to H=0 over a few px of height, eased
        // (smootherstep). So buildings EMERGE from / SINK into the ground gently as
        // they rise/recede — no element snaps on or off. (Implements the founder's
        // "building edges/fill/windows fade in as they rise and out as they
        // recede, not pop"; the synchronized rise riseDelay=0 is untouched.)
        // Fade over a WIDER height band (was 7px) AND with the slowed recede below,
        // so the per-frame alpha change of a building melting into the ground stays
        // gentle (no fast flicker on the tallest blocks' final sink).
        var hFade = smoother(clamp01(H / 13.0));     // 0 at ground .. 1 by ~13px tall
        if (hFade <= 0.002) continue;
        ctx.save();
        ctx.globalAlpha = hFade;

        // footprint corners (design space, axis-aligned)
        var lx = b.x, rx = b.x + b.w, ty = b.y, by = b.y + b.h;
        // raised top-face corners: up by H, plus a small depth skew for the roof.
        var tlx = lx + dx, tly = ty - H + dy;        // top-left  (back)
        var trx = rx + dx, t_ry = ty - H + dy;       // top-right (back)
        var blx = lx + dx, bly = by - H + dy;        // bottom-left (front-top)
        var brx2 = rx + dx, bry = by - H + dy;       // bottom-right(front-top)

        // ---- RIGHT side wall (footprint right edge -> raised right edge) ----
        // Change #3: paper-opaque underlay FIRST so the grid/traces behind the
        // building never show through this face, then the faint cobalt wash.
        ctx.beginPath();
        ctx.moveTo(rx, ty);
        ctx.lineTo(trx, t_ry);
        ctx.lineTo(brx2, bry);
        ctx.lineTo(rx, by);
        ctx.closePath();
        ctx.fillStyle = PAPER; ctx.fill();
        ctx.fillStyle = ink((EXT.fSide * A).toFixed(3));
        ctx.fill();

        // ---- FRONT wall (footprint bottom edge -> raised bottom edge) ----
        ctx.beginPath();
        ctx.moveTo(lx, by);
        ctx.lineTo(rx, by);
        ctx.lineTo(brx2, bry);
        ctx.lineTo(blx, bly);
        ctx.closePath();
        // paper underlay so windows/strokes read crisply, then faint cobalt wash.
        ctx.fillStyle = PAPER; ctx.fill();
        ctx.fillStyle = ink((EXT.fFront * A).toFixed(3)); ctx.fill();

        // ---- window grid on the FRONT wall (appears as the building tops out) ----
        var winAppear = clamp((local - 0.45) / 0.5, 0, 1);
        if (winAppear > 0.02) {
          var cols = b.cols, floors = b.floors;
          var insetX = 0.16, insetY = 0.12;
          var seed = b.litSeed;
          for (var fr = 0; fr < floors; fr++) {
            var floorFrac = floors > 1 ? fr / (floors - 1) : 0;
            // rows light from the bottom up as the wall reveals.
            var rowAppear = clamp((winAppear - (1 - floorFrac) * 0.7) / 0.34, 0, 1);
            if (rowAppear <= 0.02) continue;
            for (var cc = 0; cc < cols; cc++) {
              var fu = insetX + ((cc + 0.5) / cols) * (1 - 2 * insetX);
              var fd = insetY + ((fr + 0.5) / floors) * (1 - 2 * insetY);
              // bilerp across the front-wall quad (lx,by)-(rx,by)-(brx2,bry)-(blx,bly)
              var topX = lerp(blx, brx2, fu), topY = lerp(bly, bry, fu);
              var botX = lerp(lx, rx, fu),   botY = by;
              var wx = lerp(botX, topX, fd), wy = lerp(botY, topY, fd);
              // deterministic, loop-periodic lit state (seam-safe).
              var hsh = ((cc * 73856093) ^ (fr * 19349663) ^ seed) >>> 0;
              var baseLit = (hsh % 100) / 100;
              var aWin = 0.16;
              if (baseLit > 0.74) {
                if ((hsh % 5) === 0) {
                  var cyc = 22 + ((hsh >> 5) % 7);
                  var fl = 0.5 + 0.5 * Math.sin(tPhase * (Math.PI * 2) * cyc + (hsh % 100));
                  aWin = 0.30 + 0.45 * (fl * fl);
                } else {
                  aWin = 0.52;
                }
              }
              aWin *= rowAppear * A;
              if (aWin < 0.01) continue;
              var ww = (b.w / cols) * 0.34, wh = (H / floors) * 0.40;
              ctx.fillStyle = ink(aWin.toFixed(3));
              ctx.fillRect(wx - ww * 0.5, wy - wh * 0.5, ww, wh);
            }
          }
        }

        // ---- TOP cap (the raised roof) ----
        ctx.beginPath();
        ctx.moveTo(blx, bly);
        ctx.lineTo(brx2, bry);
        ctx.lineTo(trx, t_ry);
        ctx.lineTo(tlx, tly);
        ctx.closePath();
        ctx.fillStyle = PAPER; ctx.fill();
        ctx.fillStyle = ink((EXT.fTop * A).toFixed(3)); ctx.fill();

        // ---- crisp edges (faint) ----
        var sa = A;
        // top outline
        ctx.lineWidth = 1.0;
        ctx.strokeStyle = ink((EXT.sTop * sa).toFixed(3));
        ctx.beginPath();
        ctx.moveTo(blx, bly); ctx.lineTo(brx2, bry);
        ctx.lineTo(trx, t_ry); ctx.lineTo(tlx, tly); ctx.closePath();
        ctx.stroke();
        // front outline
        ctx.strokeStyle = ink((EXT.sFront * sa).toFixed(3));
        ctx.beginPath();
        ctx.moveTo(lx, by); ctx.lineTo(rx, by);
        ctx.lineTo(brx2, bry); ctx.lineTo(blx, bly); ctx.closePath();
        ctx.stroke();
        // vertical corner edges (front-left + front-right) for crisp uprights
        ctx.strokeStyle = ink((EXT.sEdge * sa).toFixed(3));
        ctx.beginPath();
        ctx.moveTo(lx, by); ctx.lineTo(blx, bly);
        ctx.moveTo(rx, by); ctx.lineTo(brx2, bry);
        ctx.moveTo(rx, ty); ctx.lineTo(trx, t_ry);
        ctx.stroke();
        ctx.restore();   // v8: end this building's height-fade globalAlpha
      }
      ctx.restore();
    }

    function drawHeat(amt, A) {
      if (amt <= 0.01 || A <= 0.003) return;
      ctx.save();
      for (var i = 0; i < nodes.length; i++) {
        var w = nodeTraffic[i] / maxTraffic;
        if (w < 0.34) continue;
        var nd = nodes[i];
        var rad = 8 + 16 * w;
        var ga = 0.05 * w * amt * A;   // halved — faint background heat
        var grd = ctx.createRadialGradient(nd.x, nd.y, 0, nd.x, nd.y, rad);
        grd.addColorStop(0, cob(ga.toFixed(3)));
        grd.addColorStop(1, cob(0));
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(nd.x, nd.y, rad, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.restore();
    }

    function drawAgent(ag, travelT, A) {
      if (A <= 0.003) return;
      // v3 Change #1: TRACE_AMP restores the GPS-trace alphas (v2 ~halved them)
      // to a readable middle ground — clear cobalt traces on the streets, still
      // a quiet background element under the dominant headline.
      A *= TRACE_AMP;
      var st = agentAt(ag, travelT);
      var headDist = st.dist;
      var headPos = posAtDist(ag, headDist);
      var bright = 0.85 + 0.18 * ag.hue;
      var tailLen = ag.tail;
      var DOTS = 26;
      for (var i = 0; i < DOTS; i++) {
        var frac = i / (DOTS - 1);
        var d = headDist - tailLen * (1 - frac);
        if (d < 0) continue;
        var pq = posAtDist(ag, d);
        var a = Math.pow(frac, 1.6) * 0.26 * bright * A;
        if (a < 0.004) continue;
        var rr2 = 0.7 + frac * 1.4;
        ctx.beginPath();
        ctx.fillStyle = cob(a.toFixed(3));
        ctx.arc(pq.x, pq.y, rr2, 0, Math.PI * 2);
        ctx.fill();
      }
      if (st.dwelling && st.dwellNode >= 0) {
        var dn = nodes[st.dwellNode];
        var amt = st.dwellAmt;
        for (var rIdx = 0; rIdx < 2; rIdx++) {
          var phase = (amt + rIdx * 0.5) % 1;
          var ringR = 3 + phase * 20;
          var ra = (1 - phase) * 0.21 * A;
          ctx.beginPath();
          ctx.lineWidth = 1.1;
          ctx.strokeStyle = cob(ra.toFixed(3));
          ctx.arc(dn.x, dn.y, ringR, 0, Math.PI * 2);
          ctx.stroke();
        }
        ctx.beginPath();
        ctx.fillStyle = cob((0.34 * A).toFixed(3));
        ctx.arc(dn.x, dn.y, 2.1, 0, Math.PI * 2);
        ctx.fill();
      }
      if (!st.done) {
        var r = 3.0;
        var grd = ctx.createRadialGradient(headPos.x, headPos.y, 0, headPos.x, headPos.y, r * 5);
        grd.addColorStop(0, cob((0.20 * A).toFixed(3)));
        grd.addColorStop(1, cob(0));
        ctx.fillStyle = grd;
        ctx.beginPath();
        ctx.arc(headPos.x, headPos.y, r * 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = cob((bright * 0.55 * A).toFixed(3));
        ctx.beginPath();
        ctx.arc(headPos.x, headPos.y, r, 0, Math.PI * 2);
        ctx.fill();
        // soft core: a translucent white fill (still no text).
        ctx.fillStyle = "rgba(255,255,255," + (0.5 * A).toFixed(3) + ")";
        ctx.beginPath();
        ctx.arc(headPos.x, headPos.y, r * 0.42, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    // ============================================================
    // DRAW: GLOBE (real continents). form fades the whole body up from
    // nothing at the seam; CURV (shell) fades the sphere-only elements
    // (disc/halo/rim/graticule/coast/pings) as it flattens; morph slides
    // each LAND dot from its sphere position to its grid target; the live
    // radius Rad grows so the front face flattens during the descent.
    // brightCity highlights New York approaching the morph.
    // ============================================================
    function drawGlobe(form, sinY, cosY, Rad, CURV, morph, brightCity, tPhase, gridDotFade, cityLifeAmt) {
      if (form <= 0.003) return;
      if (cityLifeAmt == null) cityLifeAmt = 0;   // v8 CITY LIFE twinkle weight (flat city)
      ctx.save();
      // Change #3: gridDotFade (= 1 - smoother(placeRise)) fades the FLATTENED
      // land-dots (the ones landed on the street grid) out as the buildings
      // rise, so nothing shows through/around the risen massing. Only the grid-
      // FORM contribution is affected (via *morph*); the spherical world dwell
      // dots are untouched (morph=0 there). Defaults to 1 if not supplied.
      var gdf = (gridDotFade === undefined) ? 1 : gridDotFade;
      // GF: global FAINTNESS for the whole globe. v3 Change #1 restores this to
      // GLOBE_GF (~1.0, up from v2's 0.55) so the land-dots, coastline,
      // graticule, rim and pings read plainly as an elegant world — still
      // secondary to the headline (the left->right scrim + #scene opacity keep
      // it a backdrop). `shell` (gating/geometry) is untouched so nothing
      // changes WHEN elements appear (seam-safe).
      var GF = GLOBE_GF;
      var shell = form * CURV;          // gating / geometry (un-dimmed)
      var shellA = shell * GF;          // alpha weight (faint)

      // 1. faint inner disc
      if (shell > 0.05) {
        var disc = ctx.createRadialGradient(GLX - Rad * 0.35, GLY - Rad * 0.4, Rad * 0.1, GLX, GLY, Rad * 1.02);
        disc.addColorStop(0, cob((0.045 * shellA).toFixed(3)));
        disc.addColorStop(0.7, cob((0.02 * shellA).toFixed(3)));
        disc.addColorStop(1, cob(0));
        ctx.fillStyle = disc;
        ctx.beginPath();
        ctx.arc(GLX, GLY, Rad, 0, Math.PI * 2);
        ctx.fill();
      }

      // 2. graticule (front hemisphere only)
      if (shell > 0.06) {
        ctx.lineWidth = 0.6;
        ctx.lineJoin = "round";
        ctx.strokeStyle = cob((0.06 * shellA).toFixed(3));
        for (var g = 0; g < grat.length; g++) {
          var line = grat[g];
          ctx.beginPath();
          var drawing = false;
          for (var gi = 0; gi < line.length; gi++) {
            var lv = line[gi];
            rotateProject(lv[0], lv[1], lv[2], sinY, cosY, Rad, out);
            if (out.z >= 0) {
              if (!drawing) { ctx.moveTo(out.sx, out.sy); drawing = true; }
              else ctx.lineTo(out.sx, out.sy);
            } else drawing = false;
          }
          ctx.stroke();
        }
      }

      // 3. coastline outlines (front only, limb fade)
      if (shell > 0.04) {
        ctx.lineWidth = 0.9;
        for (var ci = 0; ci < coastLines.length; ci++) {
          var cl = coastLines[ci];
          var n = cl.n;
          var prevFront = false, pX = 0, pY = 0, pDepth = 0;
          for (var j = 0; j < n; j++) {
            rotateProject(cl.xs[j], cl.ys[j], cl.zs[j], sinY, cosY, Rad, out);
            var front = out.z >= -0.02;
            if (front) {
              if (prevFront) {
                var dep = (pDepth + out.z) * 0.5;
                var aC = smooth((dep + 0.02) / 0.27);
                aC = (0.10 + 0.40 * aC) * shellA;
                ctx.beginPath();
                ctx.moveTo(pX, pY);
                ctx.lineTo(out.sx, out.sy);
                ctx.strokeStyle = cob(aC.toFixed(3));
                ctx.stroke();
              }
              pX = out.sx; pY = out.sy; pDepth = out.z; prevFront = true;
            } else prevFront = false;
          }
        }
      }

      // 4. dotted land points — sphere -> grid morph.
      // v8 MORPH DIP: the dots travel a long screen distance from their sphere
      // position to their grid target; at the MIDDLE of the morph that translation
      // is fastest, so a lot of "ink" moves per frame — the single largest motion
      // in the DESCEND/ASCEND beats. Dimming the dots while they are MID-FLIGHT
      // (and brightening them as they LAND on the grid / SETTLE on the sphere) cuts
      // the moving ink at exactly the fast point, so the morph's per-frame motion
      // drops toward the ordinary band — and it reads gracefully as the globe
      // DISSOLVING into / PRECIPITATING from the grid (a soft cross-hand-off, not a
      // hard slide). 0 dip at morph 0/1 (full alpha at both rest states), max dip
      // at morph 0.5. Seam-safe (morph=0 at the seam -> dip=1, no change).
      var morphDip = 1 - 0.55 * (4 * morph * (1 - morph));
      for (var pi = 0; pi < pts.length; pi++) {
        var pt = pts[pi];
        rotateProject(pt.x, pt.y, pt.z, sinY, cosY, Rad, out);
        var depth = out.z;
        var rim = Math.sqrt(out.px * out.px + out.py * out.py);
        // sphere alpha: front hemisphere, fade toward limb.
        var aa = smooth(depth / 0.35);
        var sphereA = (0.30 + 0.55 * aa) * (0.85 + 0.15 * pt.s);
        sphereA *= (depth > 0.02) ? 1 : Math.max(0, (depth + 0.1) / 0.12);
        if (sphereA < 0) sphereA = 0;
        // when flat (morph->1) the whole field shows at full grid alpha.
        var gridA = (0.45 + 0.35 * pt.s);
        var faceA = lerp(sphereA, gridA, morph);
        // position: sphere point -> grid target.
        var x = lerp(out.sx, pt.gx, morph);
        var y = lerp(out.sy, pt.gy, morph);
        // Change #3: fade the GRID-FORM dots (these are landed ON the streets)
        // out as the buildings rise. lerp(1, gdf, morph): sphere dots (morph=0)
        // unaffected; flattened street dots (morph=1) scale by gdf -> 0 at the
        // fully-risen hold, so no dotted streets show through/around the massing.
        var alpha = faceA * form * GF * (1 - morph * (1 - gdf)) * morphDip;   // faint
        // v8 CITY LIFE — the flat city must never be a FROZEN frame (the founder's
        // "fixed frame images"). When the grid is flat (morph high) and visible,
        // each landed dot gently TWINKLES on its own loop-periodic phase (a living
        // city map / lit windows), so the otherwise-static PING/RESOLVE/SETTLED
        // beats carry continuous low-level motion instead of sitting at ~0 delta
        // between the moving beats. cityLifeAmt is 0 on the sphere (morph=0) and
        // tapers off as buildings rise, so it never adds motion to the globe dwell
        // or the building beat; it is phase-locked to tPhase so the seam stays
        // byte-identical (whole number of twinkle cycles per loop).
        alpha *= (1 + CITY_TW_AMP * cityLifeAmt * pt.tw * Math.sin(tPhase * (Math.PI * 2) * CITY_TW_CYC + pt.s * 6.2831853));
        if (alpha < 0.004) continue;
        var rad = lerp((0.85 + 0.7 * depth) * (0.9 + 0.25 * pt.s), 1.0 + 0.3 * pt.s, morph);
        ctx.beginPath();
        ctx.fillStyle = cob(alpha.toFixed(3));
        ctx.arc(x, y, rad, 0, Math.PI * 2);
        ctx.fill();
      }

      // 5. city pings (sphere only) — soft pulse W..E. The pulse uses a
      // LOOP-PERIODIC phase that completes a whole number of cycles per loop,
      // so the ping size at the world hold is identical at t=0 and t=LOOP
      // (seam-matching). tPhase is the loop position 0..1.
      if (shell > 0.25) {
        var la = (shell - 0.25) / 0.75;
        var pulseV = 0.5 + 0.5 * Math.sin(tPhase * (Math.PI * 2) * 12);
        for (var k2 = 0; k2 < cityVecs.length; k2++) {
          var cv = cityVecs[k2];
          rotateProject(cv.x, cv.y, cv.z, sinY, cosY, Rad, out);
          if (out.z <= 0.05) continue;
          var cdepth = smooth(out.z / 0.4);
          var gr = ctx.createRadialGradient(out.sx, out.sy, 0, out.sx, out.sy, 6 + 3 * pulseV);
          gr.addColorStop(0, "rgba(37,72,170," + (0.55 * cdepth * la * GF).toFixed(3) + ")");
          gr.addColorStop(1, "rgba(37,72,170,0)");
          ctx.beginPath();
          ctx.arc(out.sx, out.sy, 6 + 3 * pulseV, 0, Math.PI * 2);
          ctx.fillStyle = gr;
          ctx.fill();
          ctx.beginPath();
          ctx.arc(out.sx, out.sy, 1.6, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(20,40,110," + (0.9 * cdepth * la * GF).toFixed(3) + ")";
          ctx.fill();
        }
      }

      // 6. the descent beacon — New York brightens approaching the morph.
      if (brightCity > 0.01 && shell > 0.02) {
        rotateProject(DESCEND_VEC[0], DESCEND_VEC[1], DESCEND_VEC[2], sinY, cosY, Rad, out);
        if (out.z > -0.2) {
          var bc = brightCity * Math.min(1, (out.z + 0.2) * 1.5) * GF;  // faint
          for (var kk = 0; kk < 2; kk++) {
            var rp = (brightCity * 1.3 + kk * 0.5) % 1;
            ctx.beginPath();
            ctx.lineWidth = 1.6;
            ctx.strokeStyle = cob(((1 - rp) * 0.55 * bc).toFixed(3));
            ctx.arc(out.sx, out.sy, 4 + rp * 30, 0, Math.PI * 2);
            ctx.stroke();
          }
          var bg = ctx.createRadialGradient(out.sx, out.sy, 0, out.sx, out.sy, 26);
          bg.addColorStop(0, cob((0.5 * bc).toFixed(3)));
          bg.addColorStop(1, cob(0));
          ctx.fillStyle = bg;
          ctx.beginPath();
          ctx.arc(out.sx, out.sy, 26, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = cob((0.95 * bc).toFixed(3));
          ctx.beginPath();
          ctx.arc(out.sx, out.sy, 3.2, 0, Math.PI * 2);
          ctx.fill();
          ctx.fillStyle = "rgba(255,255,255," + (0.85 * bc).toFixed(3) + ")";
          ctx.beginPath();
          ctx.arc(out.sx, out.sy, 1.4, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // 7. clean rim circle + halo (sphere only).
      if (shell > 0.03) {
        ctx.beginPath();
        ctx.arc(GLX, GLY, Rad, 0, Math.PI * 2);
        ctx.strokeStyle = cob((0.28 * shellA).toFixed(3));
        ctx.lineWidth = 1.1;
        ctx.stroke();
        ctx.beginPath();
        ctx.arc(GLX, GLY, Rad + 6, 0, Math.PI * 2);
        ctx.strokeStyle = cob((0.07 * shellA).toFixed(3));
        ctx.lineWidth = 1.0;
        ctx.stroke();
      }

      ctx.restore();
    }

    // ============================================================
    // DRAW: PLACE (iso massing). Painted back-to-front with per-building
    // staggered rise; A is the cross-fade weight (isoFade). Centered on
    // ISO.cx/cy which sits at the composition centre, so under the deep
    // block zoom it occupies the same screen region as the focus block.
    // ============================================================
    function drawPlace(rise01, A, tPhase) {
      if (A <= 0.003) return;
      ctx.save();
      // ground + footprints fade in with A; buildings extrude with rise01.
      drawGroundIso(A);
      var winFrac = smooth(clamp((rise01 - 0.15) / 0.5, 0, 1));
      var footStroke = lerp(1.0, 0.30, smooth(rise01)) * 1.0;
      var parcels = BLOCK.parcels, n = parcels.length;
      for (var i = 0; i < n; i++) {
        var b = parcels[i];
        // per-building local rise from the global envelope + its delay/dur.
        var f = n > 1 ? i / (n - 1) : 0;
        var local;
        if (rise01 <= 0) local = 0;
        else if (rise01 >= 1) local = 1;
        else if (rise01 <= b.riseDelay) local = 0;
        else {
          // Change #1: staggered START, accelerating (pow 1.5) ease so every
          // parcel crests at exactly rise01=1 with non-zero velocity — a
          // continuous wave with no idle/frozen plateau at the top.
          local = Math.pow(clamp((rise01 - b.riseDelay) / (1 - b.riseDelay), 0, 1), 1.5);
        }
        drawBuilding(b, local, winFrac, footStroke, tPhase, A);
      }
      ctx.restore();
    }

    // ============================================================
    // MAIN FRAME — real wall-clock time, seamless loop.
    // ============================================================
    var startTime = null;

    function frame(now) {
      if (startTime === null) startTime = now;
      var tNow = (now - startTime) / 1000;   // continuous wall-clock
      var t = tNow % LOOP;                    // loop-local time 0..LOOP
      var tPhase = t / LOOP;                  // loop phase 0..1 (seam-periodic clock)

      // clear to paper (device space).
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = PAPER;
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      var morph = morphCity(t);
      var curv = curvature(t);

      // ---- camera: one continuous descending-then-ascending move ----
      // City push (during flatten) composed with the deep block zoom.
      var cityS = cameraCity(t);
      var blk = cameraBlock(t);
      var camS = cityS * blk.s;
      // focus: during the flatten zoom toward grid centre; during the block
      // zoom, toward the focus block centre. Blend by the block zoom amount.
      var fx = lerp(GCX, FOCUS.cx, blk.amt);
      var fy = lerp(GCY, FOCUS.cy, blk.amt);

      setView();
      if (camS !== 1) {
        ctx.translate(fx, fy);
        ctx.scale(camS, camS);
        ctx.translate(-fx, -fy);
      }

      // PLACE rise envelope — drives the IN-PLACE extrude (up -> hold -> down).
      // Computed early so the flat footprints can fade out as they grow upward.
      var rise = placeRise(t);

      // RESOLVE envelopes — drive the reticle / lock-ring / ping convergence.
      // v6: the resolve happens on the CLEAN grid (the pings have already fully
      // faded out before it begins), so it never overlaps the ping beat.
      var res = resolveEnv(t);

      // ===== GRID (draws in under the landing globe dots; fades on ascent) =====
      // v8: the grid's OVERALL alpha builds up over a long (>=1.4s) smootherstep so
      // it fades IN gently as the globe dots land (cross-dissolve with the morph,
      // no pop), and fades OUT over the long ascent ramp as the globe re-forms.
      var gridDraw = ramp(t, B.gridDraw0, B.gridDraw1);
      var gridIn = ramp(t, B.gridDraw0, B.gridDraw0 + 1.4);
      var gridOut = 1 - ramp(t, B.ascend0, B.gridGone);
      var gridAlpha = gridIn * gridOut;
      // Pass `rise` so each flat footprint dims as it extrudes (no leftover
      // flat outline under a risen building) — the footprint IS the building.
      // Pass baseMapFade so the WHOLE static base map (streets + footprints +
      // diagonal + nodes) dims to a near-empty field for RESOLVE/BUILDINGS —
      // the founder's core fix: ONE dominant element per beat, not a busy grid.
      // Pass lockAnchor so the single locked block stays marginally more visible
      // during the resolve to anchor the lock.
      var baseFade = baseMapFade(t);
      drawGrid(gridDraw, gridAlpha, rise, baseFade, lockAnchor(t));

      // ===== DENSITY HEAT =====
      // v6: the density haze is part of the PING beat — it fades FULLY OUT with
      // the pings (heatFade0..heatFade1) so the RESOLVE happens on a clean grid
      // with no city-density haze competing. (Also clamped to 0 once buildings
      // rise, belt-and-braces.)
      var heatAmt = ramp(t, B.heat0, B.heat0 + 1.2)
                    * (1 - ramp(t, B.heatFade0, B.heatFade1))
                    * gridOut * (1 - smoother(rise));
      drawHeat(heatAmt, 1);

      // ===== TRACES / GPS PINGS (granular city movement; strictly on the street
      // graph) — the PING beat. Drawn at ground level BEFORE the extrude.
      // v6 NON-OVERLAP: the pings ramp in, stay clearly visible, then FULLY FADE
      // OUT to 0 on their OWN envelope (traceFade0..traceFade1), completing BEFORE
      // the resolve begins. This is the load-bearing fix — previously the traces
      // were only knocked down 85% and were coupled to res.conv, so they still
      // cluttered the reticle. Now they are genuinely 0 (alpha -> 0) by 23.7, and
      // the resolve (25.0+) and buildings (30.2+) all happen after they are gone,
      // so nothing competes with each beat.
      // v8: the WHOLE trace layer fades IN over a long (>=1.4s) smootherstep that
      // OVERLAPS the grid draw-in, and fades OUT over the long traceFade ramp that
      // OVERLAPS the resolve build — a cross-dissolve, never a hard cut. Each
      // individual agent's own appear/disappear is also eased (smoother, longer
      // windows) so no single trace pops on/off like a fixed frame.
      var traceA =
        ramp(t, B.trace0, B.trace0 + 1.4) *
        (1 - ramp(t, B.traceFade0, B.traceFade1));
      if (traceA > 0.004) {
        for (var i = 0; i < agents.length; i++) {
          var ag = agents[i];
          var dur = agentDuration(ag);
          var localT = (t - B.trace0 - ag.startDelay);
          if (localT < 0) continue;
          var rt2 = localT % (dur + 0.8);
          var agA = traceA;
          if (rt2 > dur) {
            agA *= 1 - smoother(clamp01((rt2 - dur) / 0.8)); // eased fade between laps (>=0.8s)
          } else {
            agA *= smoother(clamp01(rt2 / 0.8));             // eased appear (>=0.8s)
            agA *= 1 - smoother(clamp01((rt2 - (dur - 0.8)) / 0.8)); // eased depart (>=0.8s)
          }
          if (agA <= 0.004) continue;
          drawAgent(ag, Math.min(rt2, dur), agA);
        }
      }

      // ===== RESOLVE OVERLAY — the scattered pings CONVERGE and LOCK onto ONE
      // focal point: a reticle settles + tightens and a lock-ring sweeps closed.
      // Drawn in the SAME camera transform as the city (so it sits on the streets
      // and the camera push eases toward it), AFTER the traces and BEFORE the
      // extrude so the rising buildings cleanly occlude it as they take over.
      if (res.A > 0.003) {
        drawResolve(t, res);
      }

      // ===== CITY EXTRUDE (Change #1) — buildings rise CONTINUOUSLY in place
      // from the grid's own footprints. Drawn inside the SAME camera transform
      // as the grid (no separate layer, no projection switch, no pop) and AFTER
      // the traces so the rising massing occludes the streets behind it. A faint
      // presence weight keeps it a quiet background element; the rise envelope
      // eases up and then settles back to flat.
      if (rise > 0.0005) {
        // v3 Change #1: EXT_AMP restores the building face washes + edges to a
        // readable middle ground (the paper underlay stays fully opaque so the
        // grid/traces never show through — Change #3).
        var extA = 0.92 * EXT_AMP;  // overall presence (now plainly legible)
        drawCityExtrude(rise, extA, tPhase);
      }

      // ===== GLOBE (the world — opener & loop-back) =====
      // Drawn at FULL scale (its own push is carried by radius/curvature, not
      // the canvas transform), so the globe never inherits the block zoom.
      var form = 1.0;
      // The descend beacon brightens approaching the morph, gone in the city.
      var brightCity = pulse(t, B.descend0, B.flatten0 + 0.1, B.flatten0 + 0.5, B.flatten1 - 0.4);

      // spin: SEAMLESS whole turns across the loop so orientation matches the
      // seam; biased toward an aim so New York sits front-centre as the morph
      // fires (front-centre is lon+rotY ~ 0; DESCEND lon = -74 -> aim ~ +74deg).
      // The aim weight is a pulse that is 0 at both seam ends.
      // v8: UNIFORM continuous spin — NO aim bias. Previously the globe was PINNED
      // toward a fixed aim (NY front-centre) during the descend morph but spun at
      // full rate during the ascend morph, so the two GLOBE<->CITY boundaries were
      // ASYMMETRIC: the descend's half-formed globe barely rotated (pinned) while
      // the ascend's half-formed globe rotated at full rate, moving the re-forming
      // continents a lot -> the ASCEND boundary spiked ~2x the descend's. A fixed
      // aim also forces a big "unwind" spin somewhere (the held orientation drifts
      // from baseSpin as the loop runs), which inevitably piles onto a boundary.
      // Letting the globe spin at ONE constant rate the whole loop makes the
      // descend and ascend morphs SYMMETRIC (same per-frame motion) and keeps the
      // dwell/morph motion uniform — the metric's "ordinary motion" is the same
      // everywhere. The morph still flattens whatever's on the front face into the
      // FIXED Manhattan grid targets, so dropping the aim is purely cosmetic (the
      // grid layout is identical regardless of orientation). Seam stays byte-
      // identical: baseSpin = tPhase*3*2pi is 0 at t=0 and 6pi (== 0) at t=44.
      var TURNS = 3;
      // v8: warped phase -> the globe spins slower through the morphs, faster in
      // the dwell, completing exactly TURNS whole turns (seam byte-identical).
      // SPIN_PH0 is a CONSTANT orientation offset (added at every t, so the seam
      // stays byte-identical: ang(0)=PH0, ang(LOOP)=TURNS*2pi+PH0 == PH0 mod 2pi).
      // It is tuned so the seam/dwell orientation sits in a LOW-motion configuration
      // (the per-frame dwell delta is an oscillatory function of which dense
      // landmass is crossing the front face, so a constant rotation of the whole
      // loop lands the seam where the spin moves the fewest pixels).
      var ang = spinPhase(tPhase) * TURNS * Math.PI * 2 + SPIN_PH0;
      var sinY = Math.sin(ang), cosY = Math.cos(ang);

      var Rad = globeRadius(t);
      // globe ignores the block zoom; keep only the gentle city push so the
      // descent reads continuous (the dots morph in this same frame).
      setView();
      if (cityS !== 1) {
        ctx.translate(GCX, GCY);
        ctx.scale(cityS, cityS);
        ctx.translate(-GCX, -GCY);
      }
      // gridDotFade: fade the flattened street-grid land-dots out as the
      // buildings rise (Change #3) so only the clean massing shows at the hold.
      // ALSO fold in baseMapFade: the dotted land-dots that landed ON the streets
      // ARE the dominant visible "street grid" texture (drawGrid only adds the
      // solid avenue/cross-street strokes + footprints). Without this, the RESOLVE
      // and BUILDINGS beats still sat on a busy dotted grid — the founder's exact
      // complaint. Multiplying baseFade here dims that dotted base map to the same
      // near-empty floor (~0.12) so the reticle/lock and the buildings dominate.
      // baseFade only affects the FLATTENED dots (morph>0); the spherical globe
      // dots (morph=0) are untouched, so the globe beat + the seam are unchanged.
      var gridDotFade = (1 - smoother(rise)) * baseFade;
      // v8 CITY LIFE: gentle dot twinkle ONLY when the city is FULLY FLAT (morph
      // > 0.97) and the buildings are not yet dominating — i.e. across the
      // PING/RESOLVE/SETTLED beats. The gate is tight (0.97, not 0.85) so the
      // twinkle does NOT switch on during the morph's tail, where it would ADD to
      // the already-elevated morph motion; it is 0 during both morph transitions,
      // 0 on the sphere/dwell, and 0 at the building crest.
      var cityLifeAmt = smoother(clamp01((morph - 0.97) / 0.03)) * (1 - smoother(rise));
      drawGlobe(form, sinY, cosY, Rad, curv, morph, brightCity, tPhase, gridDotFade, cityLifeAmt);

      requestAnimationFrame(frame);
    }

    // autoplay; never throw on the recording.
    requestAnimationFrame(frame);

  } catch (err) {
    // Graceful fallback — paint paper.
    try {
      var cv = document.getElementById("scene");
      var c2 = cv && cv.getContext ? cv.getContext("2d") : null;
      if (c2) {
        c2.setTransform(1, 0, 0, 1, 0, 0);
        c2.fillStyle = "#F6F4EF";
        c2.fillRect(0, 0, cv.width, cv.height);
      }
      if (window.console) console.error("hero-final init failed:", err);
    } catch (e2) {}
  }
})();
</script>
