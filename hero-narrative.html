    ];
    var BWY = { x0: 270, y0: 104, x1: 740, y1: 470 };

    var nodes = [];
    var nodeKey = {};
    function addNode(x, y) {
      var kx = Math.round(x * 2) / 2, ky = Math.round(y * 2) / 2;
      var key = kx + "," + ky;
      if (nodeKey[key] != null) return nodeKey[key];
      var id = nodes.length;
      nodes.push({ x: kx, y: ky, id: id });
      nodeKey[key] = id;
      return id;
    }
    var edges = [];
    var edgeSet = {};
    function addEdge(a, b) {
      if (a === b) return;
      var k = a < b ? a + "_" + b : b + "_" + a;
      if (edgeSet[k]) return;
      edgeSet[k] = 1;
      var na = nodes[a], nb = nodes[b];
      var len = Math.hypot(nb.x - na.x, nb.y - na.y);
      edges.push({ a: a, b: b, len: len });
    }

    var lattice = [];
    for (var ai = 0; ai < AVENUES.length; ai++) {
      lattice[ai] = [];
      for (var si = 0; si < STREETS.length; si++) {
        lattice[ai][si] = addNode(AVENUES[ai].x, STREETS[si].y);
      }
    }
    for (ai = 0; ai < AVENUES.length; ai++) {
      for (si = 0; si < STREETS.length; si++) {
        if (si + 1 < STREETS.length) addEdge(lattice[ai][si], lattice[ai][si + 1]);
        if (ai + 1 < AVENUES.length) addEdge(lattice[ai][si], lattice[ai + 1][si]);
      }
    }

    var dvx = BWY.x1 - BWY.x0, dvy = BWY.y1 - BWY.y0;
    var diagPts = [{ t: 0, x: BWY.x0, y: BWY.y0 }, { t: 1, x: BWY.x1, y: BWY.y1 }];
    function diagAtX(x) {
      if (Math.abs(dvx) < 1e-6) return null;
      var t = (x - BWY.x0) / dvx;
      if (t < 0 || t > 1) return null;
      return { t: t, x: x, y: BWY.y0 + dvy * t };
    }
    function diagAtY(y) {
      if (Math.abs(dvy) < 1e-6) return null;
      var t = (y - BWY.y0) / dvy;
      if (t < 0 || t > 1) return null;
      return { t: t, x: BWY.x0 + dvx * t, y: y };
    }
    for (ai = 0; ai < AVENUES.length; ai++) {
      var dpa = diagAtX(AVENUES[ai].x);
      if (dpa) diagPts.push(dpa);
    }
    for (si = 0; si < STREETS.length; si++) {
      var dps = diagAtY(STREETS[si].y);
      if (dps) diagPts.push(dps);
    }
    diagPts.sort(function (p, q) { return p.t - q.t; });
    var diagNodeIds = [];
    var lastT = -1;
    for (var di = 0; di < diagPts.length; di++) {
      if (diagPts[di].t - lastT < 1e-4) continue;
      lastT = diagPts[di].t;
      var nid = addNode(diagPts[di].x, diagPts[di].y);
      diagNodeIds.push(nid);
    }
    for (di = 0; di + 1 < diagNodeIds.length; di++) {

    }
    for (di = 0; di < diagNodeIds.length; di++) {
      var dn = nodes[diagNodeIds[di]];
      for (ai = 0; ai < AVENUES.length; ai++) {
        if (Math.abs(dn.x - AVENUES[ai].x) < 0.6) {
          var bestS = -1, bestD = 1e9;
          for (si = 0; si < STREETS.length; si++) {
            var d = Math.abs(dn.y - STREETS[si].y);

          }
          if (bestS >= 0 && bestD > 0.6 && bestD < 90) addEdge(diagNodeIds[di], lattice[ai][bestS]);
        }
      }
      for (si = 0; si < STREETS.length; si++) {
        if (Math.abs(dn.y - STREETS[si].y) < 0.6) {
          var bestA = -1, bestD2 = 1e9;
          for (ai = 0; ai < AVENUES.length; ai++) {
            var d2 = Math.abs(dn.x - AVENUES[ai].x);
            if (d2 < bestD2) { bestD2 = d2; bestA = ai; }
          }
          if (bestA >= 0 && bestD2 > 0.6 && bestD2 < 110) addEdge(diagNodeIds[di], lattice[bestA][si]);

    }

    var adj = [];
    for (var nI = 0; nI < nodes.length; nI++) adj[nI] = [];
    for (var e = 0; e < edges.length; e++) {
      adj[edges[e].a].push({ to: edges[e].b, len: edges[e].len });
      adj[edges[e].b].push({ to: edges[e].a, len: edges[e].len });
    }

    var GCX = (GX0 + GX1) / 2;
    var GCY = (GY0 + GY1) / 2;

    // ---- Building footprints (blocks between streets) ----
    // Each footprint also carries EXTRUSION metadata so it can rise UP in
    // place (screen-space vertical extrude) directly from this same flat rect
    // during the PLACE beat — no separate layer, the footprint itself grows.
    var blocks = [];
    var _hDeck = [40, 16, 30, 12, 52, 26, 44, 14, 22, 36, 20, 48, 28, 18, 34];
    var _hPtr = 0;
    function pushBlock(bx, by, bw, bh) {
      if (bw < 4 || bh < 3) return;
      var hT = _hDeck[_hPtr % _hDeck.length] * (0.85 + rnd() * 0.4);
      _hPtr++;
      blocks.push({
        x: bx, y: by, w: bw, h: bh,
        eh: hT,                                   // extrude height (design px, up)
        floors: clamp(Math.round(hT / 7.0), 2, 8),
        cols: clamp(Math.round(bw / 7.0), 2, 6),
        litSeed: (rnd() * 1e9) | 0,
        riseDelay: 0, riseDur: 0                  // filled in after we know centres
      });
    }
    for (ai = 0; ai + 1 < AVENUES.length; ai++) {
      for (si = 0; si + 1 < STREETS.length; si++) {
        var x0 = AVENUES[ai].x, x1 = AVENUES[ai + 1].x;
        var y0 = STREETS[si].y, y1 = STREETS[si + 1].y;
        var inx = (x1 - x0) * rrange(0.12, 0.2);
        var iny = (y1 - y0) * rrange(0.14, 0.22);
        var split = rnd() < 0.4;
        if (split) {
          var midY = lerp(y0, y1, rrange(0.42, 0.58));
          pushBlock(x0 + inx, y0 + iny, x1 - x0 - 2 * inx, midY - y0 - iny - 3);
          pushBlock(x0 + inx, midY + 3, x1 - x0 - 2 * inx, y1 - midY - iny - 3);

          pushBlock(x0 + inx, y0 + iny, x1 - x0 - 2 * inx, y1 - y0 - 2 * iny);
        }
      }
    }
    // (Per-block rise stagger is assigned just below, AFTER the FOCUS block is
    // known — the rise is a spatial WAVE that originates from the LOCKED focus
    // block, so the resolve visually "becomes" the buildings. See stageBlocks().)

    // The ONE block we zoom into for the PLACE beat: a central block of the
    // grid (between two avenues and two streets, near the composition centre).
    // We zoom the camera so this block fills the frame, then hand off to the
    // isometric massing painted at the same screen centre.
    var FOCUS_AV = 2, FOCUS_ST = 1; // avenue index, street index of block's near-left corner
    var FOCUS = {
      x0: AVENUES[FOCUS_AV].x, x1: AVENUES[FOCUS_AV + 1].x,
      y0: STREETS[FOCUS_ST].y, y1: STREETS[FOCUS_ST + 1].y

    FOCUS.cx = (FOCUS.x0 + FOCUS.x1) / 2;
    FOCUS.cy = (FOCUS.y0 + FOCUS.y1) / 2;

    // ------------------------------------------------------------
    // SYNCHRONIZED RISE (founder fix #2 — the buildings must ALL rise TOGETHER,
    // not "whack-a-mole"). EVERY prior version staggered the rise: the last one
    // was a smooth radial WAVE that swept outward from the locked focus block, so
    // near blocks rose first and far corners last — which still read as random
    // per-block popping. That is now GONE entirely.
    //
    // NEW: ZERO stagger. There is NO per-block riseDelay, NO spatial stagger, NO
    // wave, NO radial offset. Every block shares the EXACT SAME rise progress
    // (rise01) at every frame — the per-block height is just b.eh * smoother(rise01)
    // for all blocks (see drawCityExtrude). The single global placeRise() envelope
    // drives the whole city: all footprints settle on the grid first, then the
    // entire skyline rises SIMULTANEOUSLY on one shared, smootherstep-eased
    // timeline, crests together, holds briefly (buildings LAST), and recedes
    // together. riseDelay is kept on each block but pinned to 0 so any consumer
    // still finds the field; riseDur is informational only.
    (function stageBlocks() {
      var n = blocks.length;
      for (var i = 0; i < n; i++) {
        blocks[i].riseDelay = 0;                         // SYNCHRONIZED: no stagger
        var tall = clamp(blocks[i].eh / 55, 0, 1);
        blocks[i].riseDur = lerp(0.55, 0.82, tall);      // metadata only (unused for timing)
      }
    })();

    // ============================================================
    // AGENTS (physics-correct street-following traces) — scene-1.
    // Each owns a precomputed ROUTE = ordered nodes joined by real
    // edges, so a trace can NEVER cut through a block. Turns only at
    // nodes. Dwells at chosen nodes -> ping.
    // ============================================================
    function randomWalk(start, steps) {
      var route = [start];
      var prev = -1, cur = start;
      for (var s = 0; s < steps; s++) {
        var opts = adj[cur];
        if (!opts.length) break;
        var cand = [];
        for (var i = 0; i < opts.length; i++) {
          if (opts[i].to !== prev) cand.push(opts[i]);
        }
        if (!cand.length) cand = opts.slice();
        var nxt;
        if (prev >= 0) {
          var pv = nodes[cur], pp = nodes[prev];
          var ldx = pv.x - pp.x, ldy = pv.y - pp.y;
          var lm = Math.hypot(ldx, ldy) || 1; ldx /= lm; ldy /= lm;
          var bestScore = -1e9, best = cand[0];
          for (i = 0; i < cand.length; i++) {
            var nn = nodes[cand[i].to];
            var ddx = nn.x - pv.x, ddy = nn.y - pv.y;
            var dm = Math.hypot(ddx, ddy) || 1;
            var dot = (ddx / dm) * ldx + (ddy / dm) * ldy;
            var score = dot * 1.4 + rnd() * 1.2;
            if (score > bestScore) { bestScore = score; best = cand[i]; }
          }
          nxt = best;
        } else {
          nxt = cand[(rnd() * cand.length) | 0];
        }
        route.push(nxt.to);
        prev = cur;
        cur = nxt.to;
      }
      return route;
    }

    function buildAgent(spec) {
      var route = randomWalk(spec.start, spec.steps);
      var cum = [0];
      for (var i = 1; i < route.length; i++) {
        var a = nodes[route[i - 1]], b = nodes[route[i]];
        cum.push(cum[i - 1] + Math.hypot(b.x - a.x, b.y - a.y));
      }
      var total = cum[cum.length - 1] || 1;
      var dwells = [];
      var nStops = 1 + ((rnd() < 0.5) ? 1 : 0);
      for (var k = 0; k < nStops; k++) {
        var idx = 1 + ((rnd() * (route.length - 2)) | 0);
        dwells.push({ idx: idx, dur: rrange(0.4, 0.8) });
      }
      return {
        route: route, cum: cum, total: total, dwells: dwells,
        speed: spec.speed, startDelay: spec.startDelay, hue: spec.hue, tail: spec.tail
      };
    }

    function agentAt(ag, travelT) {
      var t = travelT;
      var dist = 0;
      for (var i = 1; i < ag.route.length; i++) {
        var segLen = ag.cum[i] - ag.cum[i - 1];
        var segDur = segLen / ag.speed;
        if (t <= segDur) {
          var f = smoother(clamp01(t / segDur));
          dist = ag.cum[i - 1] + segLen * f;
          return { dist: dist, dwelling: false, dwellAmt: 0, dwellNode: -1, done: false };
        }
        t -= segDur;
        var dw = null;
        for (var d = 0; d < ag.dwells.length; d++) if (ag.dwells[d].idx === i) dw = ag.dwells[d];
        if (dw) {
          if (t <= dw.dur) {
            dist = ag.cum[i];
            return { dist: dist, dwelling: true, dwellAmt: clamp01(t / dw.dur), dwellNode: ag.route[i], done: false };
          }
          t -= dw.dur;
        }
      }
      return { dist: ag.total, dwelling: false, dwellAmt: 0, dwellNode: -1, done: true };
    }

    function agentDuration(ag) {
      var d = ag.total / ag.speed;
      for (var i = 0; i < ag.dwells.length; i++) d += ag.dwells[i].dur;
      return d;
    }

    function posAtDist(ag, dist) {
      dist = clamp01(dist / ag.total) * ag.total;
      var lo = 0, hi = ag.cum.length - 1;
      while (lo < hi) {
        var mid = (lo + hi) >> 1;
        if (ag.cum[mid] < dist) lo = mid + 1; else hi = mid;
      }
      var i1 = Math.max(1, lo), i0 = i1 - 1;
      var seg = ag.cum[i1] - ag.cum[i0];
      var f = seg > 0 ? (dist - ag.cum[i0]) / seg : 0;
      var a = nodes[ag.route[i0]], b = nodes[ag.route[i1]];
      return { x: lerp(a.x, b.x, f), y: lerp(a.y, b.y, f) };
    }

    var startNodeChoices = [
      lattice[0][0], lattice[1][4], lattice[5][0], lattice[4][4],
      lattice[2][2], lattice[0][3], lattice[5][2], lattice[3][0],
      lattice[2][4], lattice[4][1]
    ];
    var agents = [];
    var AGENT_N = 6;
    for (var gA = 0; gA < AGENT_N; gA++) {
      var fast = rnd() < 0.5;
      agents.push(buildAgent({
        start: startNodeChoices[gA % startNodeChoices.length],
        steps: 6 + ((rnd() * 4) | 0),
        speed: fast ? rrange(150, 210) : rrange(78, 110),
        startDelay: rrange(0, 1.0),
        hue: rnd(),
        tail: fast ? rrange(70, 110) : rrange(40, 65)
      }));
    }

    var nodeTraffic = new Array(nodes.length).fill(0);
    for (var ag2 = 0; ag2 < agents.length; ag2++) {
      var rt = agents[ag2].route;
      for (var ri = 0; ri < rt.length; ri++) nodeTraffic[rt[ri]] += 1;
    }
    var maxTraffic = Math.max.apply(null, nodeTraffic) || 1;

    // ============================================================
    // GLOBE — REAL CONTINENTS (proper-globe.html mechanics).
    // toVec(lon,lat) -> unit sphere vector; rotateProject spins about
    // Y then tilts about X. LAND dots additionally carry a flat grid
    // TARGET (streetTarget) so the DESCENT morphs sphere -> city grid
    // (scene-1's flatten). Coast/graticule/rim are the SHELL and fade
    // with (1 - morph).
    // ============================================================
    var GLX = CX, GLY = CY;
    var R = 250;                       // globe radius (px) — proper-globe's bold size
    var TILT = 18 * Math.PI / 180;
    var sinT = Math.sin(TILT), cosT = Math.cos(TILT);
    var D2R = Math.PI / 180;

    function toVec(lon, lat) {

      var cl = Math.cos(la);
      return [cl * Math.sin(lo), Math.sin(la), cl * Math.cos(lo)];
    }

    // streetTarget: land a flattening dot ON a real street (avenue / cross-
    // street / Broadway) with a hair of perpendicular jitter, so the morph
    // visibly PAINTS the Manhattan grid (scene-1).
    function streetTarget() {
      var segs = [];
      var i;
      for (i = 0; i < AVENUES.length; i++) segs.push({ kind: 0, i: i, len: (GY1 - GY0) });
      for (i = 0; i < STREETS.length; i++) segs.push({ kind: 1, i: i, len: (GX1 - GX0) });
      var bL = Math.hypot(BWY.x1 - BWY.x0, BWY.y1 - BWY.y0);
      segs.push({ kind: 2, i: 0, len: bL * 1.1 });
      var tot = 0;
      for (i = 0; i < segs.length; i++) tot += segs[i].len;
      var pick = rnd() * tot, acc = 0, s = segs[0];
      for (i = 0; i < segs.length; i++) { acc += segs[i].len; if (pick <= acc) { s = segs[i]; break; } }
      var jit = rrange(-1.1, 1.1);
      if (s.kind === 0) {
        return { x: AVENUES[s.i].x + jit, y: rrange(GY0, GY1) };
      } else if (s.kind === 1) {
        return { x: rrange(GX0, GX1), y: STREETS[s.i].y + jit };
      } else {
        var f = rnd();
        var bx = lerp(BWY.x0, BWY.x1, f), by = lerp(BWY.y0, BWY.y1, f);
        var dx = BWY.x1 - BWY.x0, dy = BWY.y1 - BWY.y0, dl = Math.hypot(dx, dy) || 1;
        var nx = -dy / dl, ny = dx / dl;
        return { x: bx + nx * jit, y: by + ny * jit };
      }
    }

    // Land points -> {x,y,z (unit), s (seed), gx,gy (grid target)}.
    var pts = new Array(LANDPTS.length);
    for (var i = 0; i < LANDPTS.length; i++) {
      var p = LANDPTS[i];
      var v = toVec(p[0], p[1]);
      var seed = (Math.sin((p[0] * 12.9898 + p[1] * 78.233)) * 43758.5453);
      seed = seed - Math.floor(seed);
      var tgt = streetTarget();
      // tw: per-dot twinkle weight (v8 CITY LIFE). A second deterministic hash so
      // ~half the dots twinkle and the rest stay steady -> a calm, varied "living
      // map" shimmer, not a uniform flash. Deterministic => seam-safe.
      var tw2 = (Math.sin((p[0] * 53.17 + p[1] * 7.93)) * 24634.6345);
      tw2 = tw2 - Math.floor(tw2);
      var tw = tw2 < 0.42 ? 0 : (0.5 + 0.5 * tw2);   // ~58% twinkle, weighted

    }

    // Coastline -> polylines of unit vectors (front-hemisphere culled at draw).
    var coastLines = [];
    for (var c = 0; c < COAST.length; c++) {
      var poly = COAST[c];
      for (var rr = 0; rr < poly.length; rr++) {
        var ring = poly[rr];
        if (ring.length < 2) continue;
        var xs = new Float64Array(ring.length);
        var ys = new Float64Array(ring.length);
        var zs = new Float64Array(ring.length);
        for (var k = 0; k < ring.length; k++) {
          var vv = toVec(ring[k][0], ring[k][1]);
          xs[k] = vv[0]; ys[k] = vv[1]; zs[k] = vv[2];

      }
    }

    // Unlabeled city pings (major hubs).
    var CITIES = [
      [-74.0, 40.7], [-122.4, 37.8], [-0.13, 51.5], [2.35, 48.85],
      [13.4, 52.5], [55.27, 25.2], [72.87, 19.07], [103.8, 1.35],
      [116.4, 39.9], [139.7, 35.68], [151.2, -33.87], [-46.6, -23.55],
      [-99.13, 19.43], [37.6, 55.75], [28.0, -26.2]
    ];
    var cityVecs = CITIES.map(function (cc) { var v = toVec(cc[0], cc[1]); return { x: v[0], y: v[1], z: v[2] }; });

    // Graticule (faint meridians + parallels) as polylines.
    var grat = [];
    (function buildGraticule() {
      for (var lon = -180; lon < 180; lon += 30) {
        var line = [];
        for (var lat = -80; lat <= 80; lat += 4) line.push(toVec(lon, lat));
        grat.push(line);
      }
      for (var lat2 = -60; lat2 <= 60; lat2 += 30) {
        var line2 = [];
        for (var lon2 = -180; lon2 <= 180; lon2 += 4) line2.push(toVec(lon2, lat2));
        grat.push(line2);
      }
    })();

    // The descent target city (New York). We rotate its meridian to the
    // front-centre exactly as the morph fires so it "opens out" into the grid.
    var DESCEND_LL = [-74.0, 40.7]; // [lon, lat]
    var DESCEND_VEC = toVec(DESCEND_LL[0], DESCEND_LL[1]);

    // rotateProject with a LIVE radius (so the descent can grow the sphere,
    // flattening the front-face curvature) — proper-globe's transform.
    var out = { sx: 0, sy: 0, z: 0, px: 0, py: 0 };
    function rotateProject(x, y, z, sinY, cosY, Rad, o) {
      var x1 = x * cosY + z * sinY;
      var z1 = -x * sinY + z * cosY;
      var y1 = y;
      var y2 = y1 * cosT - z1 * sinT;
      var z2 = y1 * sinT + z1 * cosT;
      var x2 = x1;
      o.sx = GLX + x2 * Rad;
      o.sy = GLY - y2 * Rad;
      o.z = z2;
      o.px = x2;
      o.py = y2;
    }

    // ============================================================
    // PLACE — ISOMETRIC BLOCK MASSING (place-rev-B.html mechanics).
    // ~10 footprints extrude into varied-height buildings with window
    // grids (a few lit). We paint it at the composition centre so it
    // overlays the zoomed-in focus block of the flat grid; a cross-fade
    // (gridFade -> isoFade) hands the surface from flat footprints to
    // built volume, and the extrusion does the rest. Reversed on ascent.
    // ============================================================
    var ISO = {
      cx: 500,   // centre of the iso block on screen (composition centre)
      cy: 322,   // a touch below centre so towers have headroom
      kx: 0.92,
      ky: 0.50,
      kh: 0.92

    var GOX = 0, GOY = 0;
    function iso(gx, gy, h) {
      var x = (gx - GOX), y = (gy - GOY);

        x: ISO.cx + (x - y) * ISO.kx,
        y: ISO.cy + (x + y) * ISO.ky - (h || 0) * ISO.kh
      };
    }

    function makeRng(seed) {
      var s = seed >>> 0;
      return function () {
        s ^= s << 13; s ^= s >>> 17; s ^= s << 5;
        return ((s >>> 0) / 4294967296);
      };
    }

    function buildBlock() {
      var rng = makeRng(0x4d616e68);
      var parcels = [];
      var BW = 150, BD = 96, GAP = 3.4, ALLEY = 7.0;
      var x0 = -BW / 2, y0 = -BD / 2;
      var rowDepth = (BD - ALLEY) / 2;
      var rows = [
        { ry: y0, rh: rowDepth },
        { ry: y0 + rowDepth + ALLEY, rh: rowDepth }
      ];
      var heightDeck = [92, 30, 54, 22, 70, 46, 78, 26, 38, 60];
      var deckPtr = 0;
      for (var ri = 0; ri < rows.length; ri++) {
        var row = rows[ri];
        var weights = [];
        var nP = 5;
        var wsum = 0;
        for (var w = 0; w < nP; w++) {
          var ww = 0.7 + rng() * 0.95;
          weights.push(ww); wsum += ww;
        }
        var usableW = BW - GAP * (nP - 1);
        var cx = x0;
        for (var pp = 0; pp < nP; pp++) {
          var pw = usableW * (weights[pp] / wsum);
          var padFront = 1.0 + rng() * 3.0;
          var padBack = 1.0 + rng() * 2.5;
          var py0 = row.ry + padFront;
          var pdep = row.rh - padFront - padBack;
          var hTarget = heightDeck[deckPtr % heightDeck.length];
          deckPtr++;
          hTarget *= (0.9 + rng() * 0.2);
          var ax = cx, ay = py0;
          var bx = cx + pw, by = py0;
          var ccx = cx + pw, ccy = py0 + pdep;
          var dx = cx, dy = py0 + pdep;
          var floors = clamp(Math.round(hTarget / 7.0), 2, 13);
          var cols = clamp(Math.round(pw / 9.0), 2, 6);
          parcels.push({
            ground: { ax: ax, ay: ay, bx: bx, by: by, cx: ccx, cy: ccy, dx: dx, dy: dy },
            h: hTarget, floors: floors, cols: cols,
            riseDelay: 0, riseDur: 0,
            litSeed: (rng() * 1e9) | 0,
            depthKey: 0
          });
          cx += pw + GAP;
        }
      }
      for (var i2 = 0; i2 < parcels.length; i2++) {
        var g = parcels[i2].ground;
        var midX = (g.ax + g.cx) / 2;
        var midY = (g.ay + g.cy) / 2;
        parcels[i2].depthKey = midX + midY;
      }
      parcels.sort(function (a, b) { return a.depthKey - b.depthKey; });
      var n = parcels.length;
      for (var kk = 0; kk < n; kk++) {
        var ff = n > 1 ? kk / (n - 1) : 0;
        var tall = clamp(parcels[kk].h / 92, 0, 1);
        parcels[kk].riseDelay = ff * 0.42;
        parcels[kk].riseDur = lerp(0.50, 0.78, tall);
      }
      return { parcels: parcels, BW: BW, BD: BD };
    }
    var BLOCK = buildBlock();

    var FACE = {
      top:   { fill: 0.085, stroke: 0.50 },
      right: { fill: 0.135, stroke: 0.52 },
      left:  { fill: 0.205, stroke: 0.55 }
    };

    // Iso paint helpers (work directly in design space; the camera transform
    // is already applied to ctx, so we draw at design coords).
    function fillPolyIso(ptsArr, fillA) {
      ctx.beginPath();
      ctx.moveTo(ptsArr[0].x, ptsArr[0].y);
      for (var i = 1; i < ptsArr.length; i++) ctx.lineTo(ptsArr[i].x, ptsArr[i].y);
      ctx.closePath();
      ctx.fillStyle = ink(fillA);
      ctx.fill();
    }
    function fillSolidFace(ptsArr, washA) {
      ctx.beginPath();
      ctx.moveTo(ptsArr[0].x, ptsArr[0].y);
      for (var i = 1; i < ptsArr.length; i++) ctx.lineTo(ptsArr[i].x, ptsArr[i].y);
      ctx.closePath();
      ctx.fillStyle = PAPER;
      ctx.fill();
      ctx.fillStyle = ink(washA);
      ctx.fill();
    }
    function strokePolyIso(ptsArr, strokeA, lw, close) {
      ctx.beginPath();
      ctx.moveTo(ptsArr[0].x, ptsArr[0].y);
      for (var i = 1; i < ptsArr.length; i++) ctx.lineTo(ptsArr[i].x, ptsArr[i].y);
      if (close) ctx.closePath();
      ctx.lineWidth = lw;
      ctx.strokeStyle = ink(strokeA);
      ctx.lineJoin = "round";
      ctx.lineCap = "round";
      ctx.stroke();
    }

    function drawWindows(O, U, D, cols, floors, appear, litFn, faceBright) {
      if (appear <= 0.001) return;
      var insetU = 0.12, insetD = 0.10;
      var marU = 0.62, marD = 0.55;
      for (var r = 0; r < floors; r++) {
        var floorFrac = floors > 1 ? r / (floors - 1) : 0;
        var rowAppear = clamp((appear - floorFrac * 0.85) / 0.18, 0, 1);
        if (rowAppear <= 0.01) continue;
        for (var cc2 = 0; cc2 < cols; cc2++) {
          var fu = (cc2 + 0.5) / cols;
          var fd = (r + 0.5) / floors;
          fu = insetU + fu * (1 - 2 * insetU);
          fd = insetD + fd * (1 - 2 * insetD);
          var sxp = O.x + U.x * fu + D.x * fd;
          var syp = O.y + U.y * fu + D.y * fd;
          var lit = litFn(cc2, r);
          var baseA = (0.26 + faceBright * 0.16) * rowAppear;
          var a = lit > 0 ? clamp((0.50 + lit * 0.46) * rowAppear, 0, 0.96) : baseA;
          var uHalf = { x: (U.x / cols) * 0.5 * marU, y: (U.y / cols) * 0.5 * marU };
          var dHalf = { x: (D.x / floors) * 0.5 * marD, y: (D.y / floors) * 0.5 * marD };
          ctx.beginPath();
          ctx.moveTo(sxp - uHalf.x - dHalf.x, syp - uHalf.y - dHalf.y);
          ctx.lineTo(sxp + uHalf.x - dHalf.x, syp + uHalf.y - dHalf.y);
          ctx.lineTo(sxp + uHalf.x + dHalf.x, syp + uHalf.y + dHalf.y);
          ctx.lineTo(sxp - uHalf.x + dHalf.x, syp - uHalf.y + dHalf.y);
          ctx.closePath();
          ctx.fillStyle = ink(a);
          ctx.fill();
        }
      }
    }

    function drawGroundIso(A) {
      if (A <= 0.003) return;
      var pad = 26;
      var gx0 = -BLOCK.BW / 2 - pad, gx1 = BLOCK.BW / 2 + pad;
      var gy0 = -BLOCK.BD / 2 - pad, gy1 = BLOCK.BD / 2 + pad;
      var c0 = iso(gx0, gy0, 0), c1 = iso(gx1, gy0, 0),
          c2 = iso(gx1, gy1, 0), c3 = iso(gx0, gy1, 0);
      fillPolyIso([c0, c1, c2, c3], 0.022 * A);
      strokePolyIso([c0, c1, c2, c3], 0.10 * A, 0.8, true);
      var step = 24;
      for (var gx = gx0; gx <= gx1 + 0.01; gx += step) {
        var a = iso(gx, gy0, 0), b = iso(gx, gy1, 0);
        strokePolyIso([a, b], 0.05 * A, 0.6, false);
      }
      for (var gy = gy0; gy <= gy1 + 0.01; gy += step) {
        var a2 = iso(gx0, gy, 0), b2 = iso(gx1, gy, 0);
        strokePolyIso([a2, b2], 0.05 * A, 0.6, false);
      }
    }

    function drawBuilding(b, riseFrac, winFrac, footStroke, tPhase, A) {
      var g = b.ground;
      var h = b.h * riseFrac;
      var Ag = iso(g.ax, g.ay, 0);
      var Bc = iso(g.bx, g.by, 0);
      var C = iso(g.cx, g.cy, 0);
      var D = iso(g.dx, g.dy, 0);
      if (footStroke > 0.01) {
        fillPolyIso([Ag, Bc, C, D], 0.05 * footStroke * A);
        strokePolyIso([Ag, Bc, C, D], 0.55 * footStroke * A, 1.0, true);
      }
      if (h < 0.4) return;
      var At = iso(g.ax, g.ay, h);
      var Bt = iso(g.bx, g.by, h);
      var Ct = iso(g.cx, g.cy, h);
      var Dt = iso(g.dx, g.dy, h);
      var rightFace = [Ag, Bc, Bt, At];
      var leftFace = [Ag, D, Dt, At];
      var topFace = [At, Bt, Ct, Dt];
      // Note: A blends solid-face occlusion: when A<1 (cross-fade) faces are
      // washes over paper at reduced alpha so the hand-off reads as a fade.
      fillSolidFace(leftFace, FACE.left.fill * A);
      fillSolidFace(rightFace, FACE.right.fill * A);
      fillSolidFace(topFace, FACE.top.fill * A);
      var wAppear = clamp((riseFrac - 0.45) / 0.5, 0, 1) * winFrac;
      if (wAppear > 0.01) {
        var seed = b.litSeed;
        function litFor(faceId) {
          return function (cc2, r) {
            var hsh = ((cc2 * 73856093) ^ (r * 19349663) ^ (seed + faceId * 83492791)) >>> 0;
            var base = (hsh % 100) / 100;
            var on = base > 0.72 ? 1 : 0;
            if (!on) return 0;
            if ((hsh % 4) === 0) {
              var ph = (hsh % 1000) / 1000 * Math.PI * 2;
              // whole-cycle flicker over the loop -> fully deterministic + seam-safe
              var cyc = 22 + ((hsh >> 5) % 7);
              var fl = 0.5 + 0.5 * Math.sin(tPhase * (Math.PI * 2) * cyc + ph);
              if ((hsh % 23) === 0) return 0.06 + 0.94 * (fl * fl);
              return 0.30 + 0.70 * fl;
            }
            return 1;
          };
        }
        var Ro = { x: Ag.x, y: Ag.y };
        var Ru = { x: Bc.x - Ag.x, y: Bc.y - Ag.y };
        var Rd = { x: At.x - Ag.x, y: At.y - Ag.y };
        drawWindows(Ro, Ru, Rd, b.cols, b.floors, wAppear, litFor(0), 0.9);
        var Lo = { x: Ag.x, y: Ag.y };
        var Lu = { x: D.x - Ag.x, y: D.y - Ag.y };
        var Ld = { x: At.x - Ag.x, y: At.y - Ag.y };
        var lcols = clamp(Math.round((b.cols) * 0.8), 2, 5);
        drawWindows(Lo, Lu, Ld, lcols, b.floors, wAppear, litFor(1), 0.55);
      }
      strokePolyIso(leftFace, FACE.left.stroke * A, 1.0, true);
      strokePolyIso(rightFace, FACE.right.stroke * A, 1.0, true);
      strokePolyIso(topFace, FACE.top.stroke * A, 1.1, true);
      strokePolyIso([Ag, At], 0.6 * A, 1.1, false);
      strokePolyIso([Bc, Bt], 0.42 * A, 0.9, false);
      strokePolyIso([D, Dt], 0.42 * A, 0.9, false);
      if (b.h > 66 && riseFrac > 0.9) {
        var top = iso((g.ax + g.cx) / 2, (g.ay + g.cy) / 2, h);
        ctx.beginPath();
        ctx.arc(top.x, top.y, 1.8, 0, Math.PI * 2);
        ctx.fillStyle = ink(0.5 * winFrac * A);
        ctx.fill();
      }
    }

    // ============================================================
    // TIMELINE — one continuous descending-then-ascending camera.
    // v5 (founder feedback — LIVING BUILDINGS, Change #1): the buildings must
    // never freeze. The previous beat rose in ~2s then HELD STATIC ~4.25s
    // (dead/frozen while the globe + city pings kept moving). That static hold
    // is REMOVED entirely and its time is reallocated into a MUCH slower,
    // gentler rise + the long globe spin. The building beat is now:
    //   slow continuous rise (19.9 -> 25.6, ~5.7s)  ->  the INSTANT it tops out
    //   it begins receding/ascending back toward the globe (recede0 == rise1,
    //   25.6 -> 27.65) — NO plateau. So there is always motion on screen.
    // LOOP stays 32.0s with whole-number globe turns (TURNS=3) so the seam is
    // byte-identical. Other transitions keep their timing; only rise/recede are
    // re-shaped (slow rise, instant turnaround) and the globe dwell keeps its
    // long spin. Beats (seconds):
    //   WORLD hold/spin   0.0 - 8.5    (+ seam tail 29.25-32.0 -> long dwell)
    //   DESCEND/flatten   7.7 - 13.4   (globe -> Manhattan grid, calm)
    //   CITY + GPS        12.9 - 19.4  (traces on streets, pings)
    //   ZOOM TO PLACE     18.4 - 20.4  (camera pushes into one block)
    //   PLACE rise        19.9 - 25.6  (footprints extrude SLOWLY -> massing)
    //   PLACE recede      25.6 - 27.65 (begins the INSTANT the rise peaks; NO hold)
    //   ASCEND/un-flatten 27.45 - 29.25 (grid -> globe re-curves)
    //   WORLD hold (seam) 29.25 - 32.0 (== open)
    // Whole-number globe turns (TURNS=3) across the loop -> orientation matches
    // the seam. All envelopes return to their open values by the seam tail.
    // Periodic effects (pings, window flicker) key off tPhase (0..1) so they
    // complete whole cycles regardless of LOOP length -> seam stays exact.
    // ============================================================
    // ============================================================
    // TIMELINE (loop-local seconds). ONE continuous, seamless narrative:
    //   GLOBE dwell -> DESCEND -> PING (city traces) -> RESOLVE (reticle +
    //   lock-ring sweep, pings converge to ONE focal point) -> BUILDINGS rise
    //   (the LAST content beat) -> ASCEND -> GLOBE (loop).
    // Every boundary is crossed with a C2 smootherstep envelope so velocity is
    // continuous (no snaps / strobing). Whole-number globe turns + phase-locked
    // oscillators make the seam byte-identical (start == end).
    //
    // v6 (founder feedback — READ EACH BEAT CLEANLY, NO OVERLAP). Previously the
    // RESOLVE reticle and the rising BUILDINGS overlapped the city PINGS/traces,
    // so no beat could be read on its own. v6 PHASES EACH BEAT FULLY OUT BEFORE
    // THE NEXT BEGINS, with a short eased hand-off gap between them so only ONE
    // thing animates at a time. The loop is lengthened to 44.0s (still TURNS=3
    // whole globe turns -> byte-identical seam) to give every beat room. Beats:
    //   GLOBE dwell      0.0  - 9.0   (+ seam tail 40.5-44.0 -> long dwell)
    //   DESCEND/flatten  8.0  - 14.0  (globe -> Manhattan grid, calm)
    //   PING (traces)    14.0 - 22.0  visible, then FULLY FADE 22.0 -> 23.7
    //     -- gap 23.7 - 25.0 : clean grid settles, nothing competing --
    //   RESOLVE          25.0 - 28.0  reticle settles + lock-ring closes on ONE
    //                                 block on the CLEAN grid (pings already 0),
    //                                 then resolve cue fades 28.0 -> 29.6
    //     -- gap 29.6 - 30.2 : resolve cleared, clean grid --
    //   BUILDINGS rise   30.2 - 36.6  footprints extrude SLOWLY on clean grid
    //   BUILDINGS recede 36.6 - 38.9  begins the INSTANT the rise peaks; NO hold
    //   ASCEND/un-flatten 38.7 - 40.5 (grid -> globe re-curves)
    //   WORLD hold (seam) 40.5 - 44.0 (== open)
    // KEY RULE enforced below: pings ~0 before the resolve reticle is prominent
    // (trace fade ends 23.7, resolve starts 25.0); the resolve is clear before
    // buildings rise (resolve gone by 29.6, rise starts 30.2). Periodic effects
    // (pings on the globe, window flicker) key off tPhase (0..1) so they complete
    // whole cycles regardless of LOOP length -> the seam stays exact.
    // ============================================================
    // v7 (founder feedback — TWO fixes): (1) the PING beat DWELLED TOO LONG; the
    // visible trace window is cut roughly in half (~3.8s vs ~8s) and every later
    // beat is pulled earlier, so the pings register but never overstay. (2) the
    // buildings rose like WHACK-A-MOLE (radial/staggered wave); they now ALL rise
    // TOGETHER on ONE shared, smootherstep-eased timeline (NO per-block riseDelay,
    // NO stagger/wave/radial offset — see stageBlocks() + placeRise()). A new
    // FOOTPRINTS-SETTLED beat is inserted just before the rise: a brief moment
    // where every footprint is clearly visible on the grid and NOTHING is rising
    // yet, then the whole city rises simultaneously and crests together. The loop
    // is shortened to 36.0s; TURNS stays 3 (globe spin = tPhase*3*2pi is identical
    // at both seam ends) and every envelope settles to its open value by the seam
    // tail, so the loop is still byte-identical/seamless. New beats (seconds):
    //   GLOBE dwell        0.0  - 8.0   (+ seam tail 32.4-36.0 -> long dwell)
    //   DESCEND/flatten    7.0  - 12.5  (globe -> Manhattan grid, calm)
    //   PING (traces)      12.5 - 16.3  visible (SHORT), then FULLY FADE 16.3->17.6
    //   RESOLVE            18.0 - 20.6  reticle settles + locks on ONE block,
    //                                   then resolve cue eases out 21.2 -> 22.6
    //   FOOTPRINTS SETTLED 22.6 - 23.5  ALL footprints visible, NOTHING rising yet
    //   BUILDINGS rise     23.5 - 27.9  every block rises TOGETHER (synchronized,
    //                                   smootherstep), crests together at the top
    //   BUILDINGS last     27.9 - 28.4  brief hold at full height (buildings LAST)
    //   BUILDINGS recede   28.4 - 30.6  every block recedes TOGETHER
    //   ASCEND/un-flatten  30.4 - 32.4  (grid -> globe re-curves)
    //   WORLD hold (seam)  32.4 - 36.0  (== open)
    // KEY RULES: pings ~0 (17.6) before the reticle is prominent (resolve 18.0+);
    // resolve clear (22.6) before the footprints-settled read; rise starts (23.5)
    // only after that read; buildings fully back to flat before the ascent (seam).
    // ============================================================
    // v8 (founder feedback — ONE CONTINUOUS LOOPING VIDEO, smooth IN/OUT at EVERY
    // PHASE BOUNDARY). Prior passes (v6/v7) deliberately PHASED EACH BEAT FULLY
    // OUT with eased hand-off GAPS so only one thing animated at a time. That made
    // the beats READ cleanly but created the opposite problem the founder now
    // flags: between beats the screen FROZE (the FOOTPRINTS-SETTLED hold, the
    // building crest hold, and the clean-grid gaps were ~0 motion), then the next
    // beat LAUNCHED — so elements "show up like fixed frame images popping up".
    // Numerically: the within-beat motion sat ~2.2 (globe spin) but the frozen
    // holds were ~0.0 and the morph/recede/ascend bursts hit ~5-6, so the phase
    // BOUNDARIES spiked far above ordinary motion (a slideshow of states).
    //
    // v8 FLATTENS THE MOTION PROFILE so every boundary moves the screen no more
    // than ordinary motion (<= ~1.5x the median within-beat delta), reading as ONE
    // continuous morph. Two structural changes:
    //   (A) Consecutive beats now OVERLAP with ~0.7-1.0s CROSS-DISSOLVES (the
    //       outgoing element fades out WHILE the incoming fades in) instead of
    //       fully clearing with a gap. Every element keeps its own opacity
    //       envelope: >=0.7s smootherstep ramp IN (build up) and >=0.7s
    //       smootherstep ramp OUT (take away) at BOTH ends — no element jumps its
    //       alpha by more than ~0.08 per 0.1s anywhere.
    //   (B) NO beat freezes. The otherwise-static holds (footprints-settled, the
    //       building crest, the resolved lock) carry a tiny continuous seam-
    //       periodic "life" (a faint breath) so the per-frame delta floor never
    //       drops to ~0 between moving beats; the contrast at each boundary
    //       shrinks. The fast transitions (descend morph, recede, ascend) are
    //       STRETCHED so their per-frame velocity drops into the same band.
    // The loop is lengthened 36 -> 44.0s (founder allowed +4-8s; gentleness >
    // brevity) so every cross-fade has room and the globe spin slows into the
    // band. TURNS stays 3 (globe spin = tPhase*3*2pi is identical at t=0 and
    // t=44) and EVERY envelope still settles to its open value by the seam tail,
    // so the loop stays BYTE-IDENTICAL/seamless. New beats (loop-local seconds,
    // overlaps intentional):
    //   GLOBE dwell        0.0  - 10.0  (+ seam tail 39.0-44.0 -> long dwell)
    //   DESCEND/flatten    8.0  - 16.5  (globe -> grid; SLOW 8.5s morph)
    //   grid draw-in       12.0 - 19.0  (overlaps the morph tail AND the ping in)
    //   PING (traces)      15.5 - 24.0  (fade-in overlaps grid; fade 22.0->24.0)
    //   RESOLVE            22.5 - 30.0  (fade-in OVERLAPS the ping fade-out; the
    //                                    reticle builds as the last pings leave)
    //   FOOTPRINTS SETTLED 28.5 - 31.0  (lift OVERLAPS the resolve fade-out; gentle
    //                                    fade-UP, never a flash; carries a breath)
    //   BUILDINGS rise     30.0 - 36.5  (launch OVERLAPS the settled lift; SLOW 6.5s
    //                                    synchronized extrude; edges/fill/windows
    //                                    fade in AS they rise)
    //   BUILDINGS crest    36.5 - 37.2  (brief crest — carries a breath, not frozen)
    //   BUILDINGS recede   37.0 - 39.8  (synchronized descent; OVERLAPS ascend in)
    //   ASCEND/un-flatten  38.6 - 42.4  (grid -> globe re-curves; SLOW 3.8s; grid
    //                                    fades out AS the globe fades back in)
    //   WORLD hold (seam)  42.4 - 44.0  (== open)
    // KEY RULE (relaxed from v7's hard non-overlap to a CROSS-DISSOLVE): each beat
    // hands off to the next over ~0.7-1.0s so there is no frame where something
    // hard-cuts; the seam stays exact (whole turns + phase-locked oscillators).
    // ============================================================
    // v9 (founder feedback — TOO SLOW: more globe, rest snappier). The v8 44s loop
    // was approved for SMOOTHNESS but felt slow. v9 keeps EVERY cross-fade OVERLAP
    // window from v8 at its exact duration (the fades that made it smooth) and the
    // smoothness-critical MORPH transitions intact (descend 8.5s, ascend 6.1s), and
    // ONLY compresses the static HOLDS/DWELLS between transitions: the ping hold,
    // the resolve acquisition action, the settled ebb, the building extrude/recede.
    // The GLOBE dwell is ENLARGED (open 0->9.0 + seam tail ~34.2->35.0 ~= 9.8s of
    // visible globe) so it is by far the longest single beat — the founder lingers
    // there. Net loop 44.0 -> 35.0s, a noticeably snappier narrative with a larger
    // share on the globe. TURNS stays 3 (integer) and the periodic oscillators are
    // all tPhase=t/LOOP keyed, so the seam stays BYTE-IDENTICAL at the new length;
    // the spin-warp table auto-rebuilds from the new morph profile (slow spin while
    // morph<0.86, endpoints pinned in the dwell -> seam velocity matches). New beats
    // (loop-local seconds; overlap/fade spans carried over from v8 unchanged):
    //   GLOBE dwell        0.0  - 9.0   (+ seam tail 34.2-35.0 -> ENLARGED dwell)
    //   DESCEND/flatten    9.0  - 18.0  (globe -> grid; SLOW 8.5s morph, UNCHANGED)
    //   PING (traces)      17.0 - 22.0  (fade-in 1.4s overlaps morph; HOLD trimmed
    //                                    1.6s; fade-out 2.0s overlaps resolve-in)
    //   RESOLVE            20.5 - 25.7  (in 0.9s overlaps ping fade; lock at 23.0;
    //                                    out 2.1s overlaps rise; acquisition trimmed)
    //   FOOTPRINTS SETTLED 23.5 - 27.5  (lift 1.5s overlaps resolve-out; ebb 2.3s
    //                                    overlaps rise; fade-UP, never a flash)
    //   BUILDINGS rise     23.0 - 27.5  (synchronized extrude trimmed 6.0->4.5s on
    //                                    the clean field; overlaps settled + resolve)
    //   BUILDINGS recede   28.0 - 30.5  (synchronized descent 2.5s; OVERLAPS ascend)
    //   ASCEND/un-flatten  28.1 - 34.2  (grid -> globe re-curves; SLOW 6.1s morph,
    //                                    UNCHANGED; grid fades out AS globe fades in)
    //   WORLD hold (seam)  34.2 - 35.0  (== open)
    // ============================================================
    // v10 (founder feedback — the OPENING globe dwell is TOO LONG; open it out
    // sooner, and spin the visible globe a touch faster). v9 lingered ~9.5s on the
    // globe before it opened out; v10 cuts that opening HOLD to ~3s. The ENTIRE
    // post-dwell narrative is shifted EARLIER by a rigid -5.5s (descend block moves
    // 9.5->4.0), so the loop actually SHORTENS to 29.5s rather than rebalancing the
    // removed hold to the end: every morph DURATION (descend 8.5s, ascend 6.1s) and
    // every cross-fade OVERLAP window is preserved EXACTLY (a pure time-translation
    // of all beats >= descend). Only the opening globe HOLD is removed. The globe
